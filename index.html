<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2C3E6B">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>予約帳 - グランセノーテ</title>
<style>
:root {
  --bg-primary:     #FFFFFF;
  --bg-card:        #FFFFFF;
  --border-default: #E8EAF0;
  --border-focus:   #2C3E6B;
  --text-primary:   #2D3142;
  --text-secondary: #6B7280;
  --text-muted:     #9CA3AF;
  --accent:         #2C3E6B;
  --accent-light:   #4A6FA5;
  --accent-glow:    rgba(44,62,107,0.10);
  --success:        #10B981;
  --warning:        #F59E0B;
  --danger:         #EF4444;
  --gradient-cta:   linear-gradient(135deg, #2C3E6B 0%, #4A6FA5 100%);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { height: 100dvh; width: 100dvw; overflow: hidden; }
body {
  font-family: -apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
  background: var(--bg-primary); overflow: hidden;
  height: 100%; width: 100%; display: flex; flex-direction: column;
  color: var(--text-primary);
  padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
}


/* 縦持ち / 画面ロック時:「横にしてください」表示 */
.portrait-overlay {
  position: fixed; inset: 0; background: #fff;
  z-index: 998; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; color: var(--accent);
}
.portrait-overlay .rotate-icon {
  font-size: 48px; animation: rotateHint 2s ease-in-out infinite;
}
@keyframes rotateHint {
  0%,100% { transform: rotate(0deg); }
  50% { transform: rotate(90deg); }
}
.portrait-overlay .rotate-text { font-size: 16px; font-weight: 800; letter-spacing: 1px; }

/* ── Loading ── */
.loading-overlay {
  position: fixed; inset: 0; background: var(--bg-primary);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 999; gap: 16px;
}
.loading-overlay.hidden { display: none; }
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border-default);
  border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text-muted); font-weight: 600; }
.sync-indicator {
  position: fixed; top: var(--safe-top); left: 0; right: 0; height: 3px;
  background: var(--accent-light); z-index: 500;
  animation: syncPulse 1s ease-in-out infinite; display: none;
}
.sync-indicator.active { display: block; }
@keyframes syncPulse { 0%,100% { opacity: .3; } 50% { opacity: 1; } }
.offline-banner {
  background: var(--warning); color: #fff; text-align: center;
  padding: 4px 8px; font-size: 12px; font-weight: 700; display: none;
}
.offline-banner.active { display: block; }

/* ── Header ── */
.header {
  background: var(--bg-card);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; z-index: 100;
  border-bottom: 2px solid var(--border-default);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  gap: 8px; flex-wrap: wrap;
}
.header-left { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.header-date { font-size: 20px; font-weight: 900; color: var(--accent); letter-spacing: 1px; white-space: nowrap; }
.header-dow { font-size: 16px; font-weight: 800; margin-left: 2px; }
.nav-btn {
  width: 36px; height: 36px; border: 1.5px solid var(--border-default); border-radius: 10px;
  background: var(--bg-card); color: var(--accent); font-size: 18px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: all .15s; flex-shrink: 0;
}
.nav-btn:active { background: var(--accent-glow); border-color: var(--accent); }
.today-btn {
  padding: 6px 14px; border: 1.5px solid var(--accent); border-radius: 10px;
  background: var(--bg-card); color: var(--accent); font-size: 13px; font-weight: 800;
  cursor: pointer; letter-spacing: 1px; transition: all .15s; flex-shrink: 0;
}
.today-btn:active { background: var(--accent); color: #fff; }
.date-select-btn { display: none; }
@media (min-width: 1024px) { .date-select-btn { display: inline-flex; } }
.header-tabs { display: flex; gap: 4px; flex: 1; justify-content: center; }
.header-tab {
  padding: 5px 12px; border: 1.5px solid var(--border-default); border-radius: 8px;
  background: var(--bg-card); color: var(--text-muted); font-size: 12px; font-weight: 800;
  cursor: pointer; letter-spacing: 0.5px; transition: all .15s; white-space: nowrap;
}
.header-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.header-tab:active { opacity: 0.8; }
.header-right { display: flex; gap: 6px; flex-shrink: 0; }

/* ── Calendar Page ── */
.calendar-controls {
  display: flex; align-items: center; gap: 10px; padding: 8px 16px;
  border-bottom: 1px solid var(--border-default); flex-shrink: 0;
}
.calendar-month-label { font-size: 16px; font-weight: 900; color: var(--accent); min-width: 120px; text-align: center; }
.calendar-staff-filter {
  margin-left: auto; padding: 5px 10px; border: 1.5px solid var(--border-default);
  border-radius: 8px; font-size: 12px; font-weight: 700; background: var(--bg-card); color: var(--text-primary);
}
.calendar-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 1px; background: var(--border-default); flex: 1; overflow-y: auto;
  padding-bottom: var(--safe-bottom);
}
.cal-header {
  background: var(--bg-card); padding: 4px; text-align: center;
  font-size: 11px; font-weight: 800; color: var(--text-secondary);
  position: sticky; top: 0; z-index: 1;
}
.cal-header.sun { color: var(--danger); }
.cal-header.sat { color: var(--accent-light); }
.cal-cell {
  background: var(--bg-card); padding: 3px 4px; min-height: 60px;
  cursor: pointer; transition: background .1s; position: relative;
}
.cal-cell:active { background: var(--accent-glow); }
.cal-cell.other-month { opacity: 0.3; }
.cal-cell.today { box-shadow: inset 0 0 0 2px var(--accent); }
.cal-cell.closed { background: #F9FAFB; }
.cal-day { font-size: 11px; font-weight: 800; margin-bottom: 2px; }
.cal-day.sun { color: var(--danger); }
.cal-day.sat { color: var(--accent-light); }
.cal-dots { display: flex; flex-wrap: wrap; gap: 2px; }
.cal-dot {
  width: 18px; height: 5px; border-radius: 2px; font-size: 0;
}
.cal-name {
  font-size: 8px; font-weight: 700; color: #fff; line-height: 1;
  padding: 1px 2px; border-radius: 2px; white-space: nowrap; overflow: hidden;
}

/* ── Notification Page ── */
.notif-section { padding: 12px 16px; }
.notif-title { font-size: 14px; font-weight: 900; color: var(--accent); margin-bottom: 8px; letter-spacing: 1px; }
.notif-list { display: flex; flex-direction: column; gap: 6px; }
.notif-empty { font-size: 13px; color: var(--text-muted); padding: 12px; text-align: center; }
.notif-item {
  padding: 10px 12px; border: 1.5px solid var(--border-default); border-radius: 10px;
  background: var(--bg-card); display: flex; align-items: center; gap: 10px;
}
.notif-icon { font-size: 18px; flex-shrink: 0; }
.notif-text { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.notif-badge {
  background: var(--danger); color: #fff; font-size: 10px; font-weight: 800;
  padding: 1px 5px; border-radius: 10px; position: absolute; top: -2px; right: -2px;
}

/* Page content */
.page-content { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.settings-btn {
  padding: 6px 12px; border: 1.5px solid var(--border-default); border-radius: 10px;
  background: var(--bg-card); color: var(--text-primary); font-size: 13px; font-weight: 700;
  display: flex; align-items: center; gap: 4px; cursor: pointer; flex-shrink: 0;
}
.settings-btn:active { background: var(--accent-glow); }
.refresh-btn {
  padding: 6px 10px; border: 1.5px solid var(--border-default); border-radius: 10px;
  background: var(--bg-card); color: var(--text-primary); font-size: 16px;
  cursor: pointer; flex-shrink: 0;
}
.refresh-btn:active { background: var(--accent-glow); }

/* ── Closed day ── */
.closed-day {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800; color: var(--text-muted); background: var(--bg-primary); gap: 8px;
}
.closed-sub { font-size: 13px; font-weight: 600; }

/* ── Checklist ── */
.checklist-bar {
  background: var(--bg-card); border-bottom: 1px solid var(--border-default);
  padding: 6px 16px; display: flex; gap: 16px; flex-shrink: 0; overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.check-item {
  display: flex; align-items: center; gap: 5px; font-size: 13px;
  color: var(--text-primary); font-weight: 700; white-space: nowrap; cursor: pointer;
}
.check-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }

/* ── Grid ── */
.grid-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; padding: 0 12px 8px 12px; }
.grid-scroll { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.grid-scroll.scrollable { overflow-y: auto; -webkit-overflow-scrolling: touch; }
.grid-scroll.scrollable .grid-table { flex: none; }
.grid-scroll.scrollable .room-row { height: 44px; flex: none; }
.grid-table { display: flex; flex-direction: column; width: 100%; border: 2px solid var(--accent); border-radius: 6px; overflow: hidden; flex: 1; }

/* Memo space */
.memo-space { display: none; }

/* スタッフ出勤状況 */
.staff-status-bar {
  background: var(--bg-card); border-bottom: 1px solid var(--border-default);
  padding: 2px 12px; display: flex; gap: 6px; flex-shrink: 0; align-items: center;
  cursor: pointer; user-select: none;
}
.staff-status-label {
  font-size: 10px; font-weight: 800; color: var(--text-muted); letter-spacing: 1px;
  white-space: nowrap; display: flex; align-items: center; gap: 4px;
}
.staff-toggle-icon {
  font-size: 8px; transition: transform 0.2s;
}
.staff-status-bar.open .staff-toggle-icon { transform: rotate(180deg); }
.staff-chip {
  display: flex; align-items: center; gap: 3px; padding: 2px 8px;
  border-radius: 10px; font-size: 10px; font-weight: 800;
  border: none; color: #fff; white-space: nowrap;
}
.staff-chip.inactive { background: #D1D5DB !important; color: #9CA3AF !important; opacity: 0.7; }

/* シフトバー（アコーディオン） */
.shift-area {
  max-height: 0; overflow: hidden; transition: max-height 0.25s ease;
  flex-shrink: 0; background: var(--bg-card);
  border-bottom: 1px solid transparent;
}
.shift-area.open {
  max-height: 300px;
  border-bottom-color: var(--border-default);
}
.shift-bar-row {
  display: flex; flex-shrink: 0; height: 18px;
}
.shift-bar-cells { flex: 1; position: relative; margin-right: 20px; }
.shift-line {
  position: absolute; top: 3px; height: 12px;
  border-radius: 6px; opacity: 0.85;
  display: flex; align-items: center; padding-left: 4px;
  font-size: 8px; font-weight: 800; color: #fff; overflow: hidden; white-space: nowrap;
}

@media (min-width: 768px) {
  .staff-status-bar { padding: 4px 16px; gap: 8px; }
  .staff-chip { padding: 3px 10px; font-size: 12px; }
  .staff-status-label { font-size: 12px; }
  .shift-bar-row { height: 22px; }
  .shift-line { top: 3px; height: 16px; font-size: 9px; padding-left: 6px; }
}

/* Time header（枠の外） */
.time-header-row {
  display: flex; flex-shrink: 0; height: 20px;
  background: transparent;
}
.corner-cell {
  flex-shrink: 0;
  background: transparent;
}
.time-header-cells { flex: 1; display: flex; position: relative; margin-right: 20px; }
.hour-block {
  position: absolute; bottom: 0; height: 100%;
  display: flex; align-items: flex-end; justify-content: center;
  font-size: 11px; font-weight: 800; color: var(--text-secondary); letter-spacing: 0.5px;
  transform: translateX(-50%); padding-bottom: 1px;
}

/* Room rows */
.room-row {
  display: flex; height: 44px; flex-shrink: 0;
  border-bottom: 1px solid var(--border-default);
}
/* シフト閉じてる時: 画面に合わせて伸縮 */
.grid-scroll:not(.scrollable) .room-row {
  flex: 1; min-height: 34px; height: auto;
}
.room-row.section-divider { border-top: 2.5px solid var(--accent); }
.room-label {
  flex-shrink: 0;
  background: var(--bg-card);
  border-right: 1px solid var(--border-default);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 2px 4px; font-size: 11px; font-weight: 800; color: var(--text-primary);
  border-left: 3px solid var(--accent);
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  line-height: 1.2;
}
.room-sublabel { font-size: 10px; color: var(--text-secondary); font-weight: 700; }
.time-cells { flex: 1; position: relative; background: var(--bg-card); margin-right: 20px; }

/* Grid lines */
.grid-line {
  position: absolute; top: 0; bottom: 0; width: 0;
  pointer-events: none; z-index: 1;
}
.grid-line.hour { border-left: 1.5px solid rgba(44,62,107,0.25); }
.grid-line.quarter { border-left: 1px dashed rgba(44,62,107,0.12); }
.grid-line.half { border-left: 1px dashed rgba(44,62,107,0.12); }
.grid-line.end { border-left: 1.5px solid var(--accent); }

/* Reservations */
.reservation {
  position: absolute; top: 2px; bottom: 2px;
  border-radius: 5px; padding: 2px 4px;
  cursor: pointer; z-index: 3; overflow: hidden;
  display: flex; flex-direction: column; justify-content: center;
  transition: transform .1s;
}
.reservation:active { transform: scale(0.98); }
/* 種別スタイル */
.reservation.type-treatment {
  border: 2px solid var(--res-color, #888);
  background: var(--res-color, #888);
  box-shadow: 0 1px 4px rgba(0,0,0,0.10);
}
.reservation.type-treatment .res-name { color: #fff; }
.reservation.type-treatment .res-menu-label { background: rgba(255,255,255,0.3); color: #fff; }
.reservation.type-treatment .res-memo-tag { background: rgba(255,255,255,0.4); color: rgba(0,0,0,0.6); }
.reservation.type-treatment.checked-in {
  box-shadow: 0 1px 6px rgba(0,0,0,0.2);
}
.reservation.type-break {
  border: 2px dashed var(--res-color, #888);
  background: rgba(255,255,255,0.5);
}
.reservation.type-task {
  border: none; border-top: 3px solid var(--res-color, #888);
  border-bottom: 3px solid var(--res-color, #888);
  background: transparent; border-radius: 0;
}
.reservation.type-shopping {
  border: 2px solid var(--res-color, #888);
  background: rgba(255,255,255,0.85);
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.reservation.no-staff {
  border-color: #9CA3AF !important;
  background: rgba(200,200,200,0.3) !important;
}
/* 重なり表示 */
.reservation.overlap-0 { top: 2px; bottom: 50%; }
.reservation.overlap-1 { top: 50%; bottom: 2px; }
.reservation.overlap-2 { top: 2px; bottom: 66%; }
.reservation.overlap-3 { top: 34%; bottom: 34%; }
.reservation.overlap-4 { top: 66%; bottom: 2px; }
/* チェックイン済み */
.res-checkin { font-size: 10px; position: absolute; top: 1px; right: 3px; }
/* アフターケア線（time-cells上に直接配置） */
.aftercare-line {
  position: absolute; bottom: 4px;
  height: 4px; z-index: 4; pointer-events: none; border-radius: 2px;
}
.res-top { display: flex; align-items: center; gap: 3px; }
.res-menu-label {
  font-size: 8px; font-weight: 700; color: #fff;
  background: rgba(0,0,0,0.15); padding: 0 3px; border-radius: 2px;
  line-height: 1.3; white-space: nowrap;
}
.res-memo-tag {
  font-size: 9px; font-weight: 700; color: rgba(0,0,0,0.5);
  background: rgba(255,255,255,0.5); padding: 0 3px; border-radius: 3px;
}
.res-type-tag {
  font-size: 9px; font-weight: 800; color: var(--text-secondary);
  background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px;
  white-space: nowrap;
}
.res-name { font-size: 12px; font-weight: 800; color: var(--text-primary); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.res-name.no-staff-warn { color: var(--danger); font-size: 10px; }
/* 種別選択ボタン */
.type-selector { display: flex; gap: 6px; padding: 8px 0; flex-wrap: wrap; }
.type-btn {
  flex: 1; min-width: 70px; padding: 10px 8px; border: 2px solid var(--border-default); border-radius: 10px;
  background: var(--bg-card); font-size: 13px; font-weight: 800; color: var(--text-secondary);
  cursor: pointer; text-align: center; transition: all .15s;
}
.type-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
.type-btn:active { opacity: 0.8; }
/* 詳細設定 */
.detail-toggle {
  display: flex; align-items: center; gap: 4px; padding: 8px 0;
  font-size: 12px; font-weight: 700; color: var(--text-muted); cursor: pointer;
  border: none; background: none;
}
.detail-toggle .arrow { transition: transform .2s; }
.detail-toggle.open .arrow { transform: rotate(90deg); }
.detail-section { display: none; padding: 8px 0; }
.detail-section.open { display: block; }
.sub-assignment {
  display: flex; align-items: center; gap: 6px; padding: 4px 0;
  border-bottom: 1px solid var(--border-default);
}
.sub-assignment:last-child { border: none; }

/* Now line */
.now-line {
  position: absolute; top: 0; bottom: 0; width: 2px;
  background: var(--danger); z-index: 4; pointer-events: none;
}
.now-line::before {
  content: ''; position: absolute; top: -3px; left: -3px;
  width: 8px; height: 8px; background: var(--danger); border-radius: 50%;
}

/* Click overlay */
.click-overlay { position: absolute; inset: 0; z-index: 2; cursor: pointer; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200;
  display: none; align-items: flex-end; justify-content: center; padding: 0;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-card); border-radius: 16px 16px 0 0; width: 100%; max-width: 500px;
  max-height: 85vh; overflow-y: auto;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
  border: 1px solid var(--border-default);
  padding-bottom: var(--safe-bottom);
}
.modal-header {
  padding: 14px 16px; border-bottom: 1px solid var(--border-default);
  display: flex; justify-content: space-between; align-items: center;
  border-left: 4px solid var(--accent); position: sticky; top: 0;
  background: var(--bg-card); z-index: 1;
}
.modal-title { font-size: 15px; font-weight: 900; color: var(--accent); letter-spacing: 1px; }
.modal-close {
  width: 28px; height: 28px; border: 1px solid var(--border-default);
  background: var(--bg-primary); border-radius: 8px; font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted);
}
.modal-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.form-group { display: flex; flex-direction: column; gap: 3px; }
.form-group label { font-size: 11px; font-weight: 800; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; }
.form-group input, .form-group select {
  padding: 10px 12px; border: 1.5px solid var(--border-default); border-radius: 8px;
  font-size: 16px; background: var(--bg-card); color: var(--text-primary);
  font-weight: 600; -webkit-appearance: none; transition: border-color .15s;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.form-row { display: flex; gap: 8px; }
.form-row .form-group { flex: 1; }
.modal-footer { padding: 10px 16px; border-top: 1px solid var(--border-default); display: flex; gap: 8px; }
.btn {
  flex: 1; padding: 12px; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 800; cursor: pointer; letter-spacing: 1px;
  transition: opacity .15s;
}
.btn:active { opacity: 0.8; }
.btn-primary { background: var(--gradient-cta); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-cancel { background: var(--bg-primary); color: var(--text-secondary); border: 1px solid var(--border-default); }

/* ── Settings ── */
.settings-list { list-style: none; }
.settings-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-default); gap: 8px; }
.settings-item:last-child { border: none; }
.staff-color-dot { width: 22px; height: 22px; border-radius: 6px; border: 2px solid rgba(0,0,0,0.06); flex-shrink: 0; }
.staff-name-input { border: none; font-size: 14px; font-weight: 700; flex: 1; outline: none; min-width: 0; color: var(--text-primary); }

<script>
// ── Supabase API設定 ──
const SUPABASE_URL = 'https://lheojchyrxjlagxfbgjo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sV418nh9Akoc0EnxchRU4g_H2FFAa-4';
const SB_HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };

// ── デフォルトデータ（API未接続時のフォールバック） ──
const DEFAULT_STAFF = [
  { id: 's1', name: '峯 琴音', color: '#E53935' },
  { id: 's9', name: '朝倉 万紀子', color: '#1E88E5' },
  { id: 's4', name: '峯 敏絵', color: '#43A047' },
  { id: 's2', name: 'リン ション', color: '#FB8C00' },
  { id: 's3', name: '西村 由維', color: '#8E24AA' },
  { id: 's5', name: '林 美志', color: '#00897B' },
];

// シフトデータ（Supabaseから取得。デフォルトフォールバック用）
// allShiftsCache: 週間表示用に複数日のシフトをキャッシュ
let dayShifts = [];
let allShiftsCache = {};
function getStaffShift(staffId, date) {
  const dk = dateKey(date);
  // まず現在の日のdayShiftsを確認、次にキャッシュ
  const shifts = dk === dateKey(currentDate) ? dayShifts : (allShiftsCache[dk] || []);
  const shift = shifts.find(s => s.staffId === staffId && s.date === dk);
  if (shift) {
    // is_off=trueなら明示的に休み
    if (shift.isOff) return null;
    return { start: parseFloat(shift.start), end: parseFloat(shift.end) };
  }
  // フォールバック: デフォルトシフト（Supabaseにデータがない場合）
  const dow = date.getDay();
  const bh = getBH(date);
  if (!bh) return null;
  switch (staffId) {
    case 's1': case 's9': case 's4':
      return { start: bh.start, end: bh.end };
    case 's2': return { start: bh.start, end: 17 };
    case 's3': return { start: bh.start, end: 13 };
    case 's5': return dow === 6 ? { start: bh.start, end: bh.end } : null;
    default: return { start: bh.start, end: bh.end };
  }
}
const DEFAULT_ROOMS = [
  { id: 'r1', name: 'フェイシャル①', sub: '' },
  { id: 'r2', name: 'フェイシャル②', sub: '' },
  { id: 'r3', name: 'ボディ③', sub: 'インディバ' },
  { id: 'r4', name: 'ボディ④', sub: '' },
  { id: 'r5', name: 'ボディ⑤', sub: '脱毛', divider: true },
  { id: 'r6', name: 'ボディ⑥', sub: '' },
  { id: 'r7', name: '備考', sub: '' },
];
const DEFAULT_CHECKS = [
  { id: 'c1', label: 'ホトペブログ' },
  { id: 'c2', label: 'ホームページブログ' },
  { id: 'c3', label: '明日のセッティング・清掃終了場所' },
];

// ── 状態 ──
let staff = [];
let rooms = [];
let checks = [];
let dayReservations = [];
let dayCheckStates = {};
let currentDate = new Date(); currentDate.setHours(0,0,0,0);
let syncing = false;

const DOW = ['日','月','火','水','木','金','土'];
function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

// ── Supabase API通信 ──
function showSync(on) {
  syncing = on;
  document.getElementById('syncIndicator').classList.toggle('active', on);
}

async function sbGet(table, query = '') {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } });
    if (!res.ok) throw new Error(`${res.status}`);
    return await res.json();
  } catch(e) { console.warn('Supabase GET error:', e); return null; }
}

async function sbPost(table, data) {
  showSync(true);
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST', headers: { ...SB_HEADERS, 'Prefer': 'return=representation,resolution=merge-duplicates' }, body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
    return await res.json();
  } catch(e) { console.error('Supabase POST error:', e); return null; }
  finally { showSync(false); }
}

async function sbDelete(table, query) {
  showSync(true);
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
      method: 'DELETE', headers: SB_HEADERS
    });
    if (!res.ok) throw new Error(`${res.status}`);
    return true;
  } catch(e) { console.error('Supabase DELETE error:', e); return false; }
  finally { showSync(false); }
}

async function sbUpsert(table, data) {
  showSync(true);
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST', headers: { ...SB_HEADERS, 'Prefer': 'return=minimal,resolution=merge-duplicates' }, body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
    return true;
  } catch(e) { console.error('Supabase UPSERT error:', e); return false; }
  finally { showSync(false); }
}

// snake_case <-> camelCase 変換
function snakeToCamel(obj) {
  const r = {};
  for (const k in obj) {
    const ck = k.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
    r[ck] = obj[k];
  }
  return r;
}

// ── LocalStorage（キャッシュ用） ──
function lsLoad(key, def) { try { const d = localStorage.getItem('rs_' + key); return d ? JSON.parse(d) : JSON.parse(JSON.stringify(def)); } catch { return JSON.parse(JSON.stringify(def)); } }
function lsSave(key, data) { localStorage.setItem('rs_' + key, JSON.stringify(data)); }

// ── データ読込（2段階: localStorageで即表示 → Supabaseで最新に更新） ──
function loadConfigFromCache() {
  staff = lsLoad('staff', DEFAULT_STAFF);
  rooms = lsLoad('rooms', DEFAULT_ROOMS);
  checks = lsLoad('checks', DEFAULT_CHECKS);
}

function loadDayDataFromCache() {
  const dk = dateKey(currentDate);
  const allRes = lsLoad('reservations', {});
  dayReservations = allRes[dk] || [];
  dayCheckStates = (lsLoad('checkstates', {}))[dk] || {};
  dayShifts = (lsLoad('shifts', {}))[dk] || [];
}

async function syncConfigFromApi() {
  try {
    const [staffData, roomData, checkData] = await Promise.all([
      sbGet('yoyaku_staff', 'order=sort_order'),
      sbGet('yoyaku_rooms', 'order=sort_order'),
      sbGet('yoyaku_checks', 'order=sort_order'),
    ]);
    if (staffData) {
      staff = staffData.map(s => ({ id: s.id, name: s.name, color: s.color, sortOrder: s.sort_order }));
      lsSave('staff', staff);
    }
    if (roomData) {
      rooms = roomData.map(r => ({ id: r.id, name: r.name, sub: r.sub || '', divider: r.divider, sortOrder: r.sort_order }));
      lsSave('rooms', rooms);
    }
    if (checkData) {
      checks = checkData.map(c => ({ id: c.id, label: c.label, sortOrder: c.sort_order }));
      lsSave('checks', checks);
    }
    renderAll();
  } catch(e) { console.warn('Config sync error', e); }
}

async function syncDayDataFromApi() {
  const dk = dateKey(currentDate);
  try {
    const [resData, stateData, shiftData] = await Promise.all([
      sbGet('yoyaku_reservations', `date=eq.${dk}`),
      sbGet('yoyaku_check_states', `date=eq.${dk}`),
      sbGet('yoyaku_shifts', `date=eq.${dk}`),
    ]);
    if (resData) {
      dayReservations = resData.map(r => ({
        id: r.id, date: r.date, name: r.name, menu: r.menu || '',
        staffId: r.staff_id || '', start: r.start_time, end: r.end_time,
        roomId: r.room_id, memo: r.memo || '', updatedAt: r.updated_at,
        type: r.type || 'treatment', checkedIn: r.checked_in || false,
        aftercareEnd: r.aftercare_end || null,
        aftercareStaffId: r.aftercare_staff_id || null,
        subAssignments: r.sub_assignments || null,
      }));
      const allRes = lsLoad('reservations', {});
      allRes[dk] = dayReservations;
      lsSave('reservations', allRes);
    }
    if (stateData) {
      dayCheckStates = {};
      stateData.forEach(s => { dayCheckStates[s.check_id] = s.checked; });
      const allStates = lsLoad('checkstates', {});
      allStates[dk] = dayCheckStates;
      lsSave('checkstates', allStates);
    }
    if (shiftData) {
      dayShifts = shiftData.map(s => ({
        id: s.id, staffId: s.staff_id, date: s.date,
        start: s.start_time, end: s.end_time, isOff: s.is_off
      }));
      const allShifts = lsLoad('shifts', {});
      allShifts[dk] = dayShifts;
      lsSave('shifts', allShifts);
    }
    renderAll();
  } catch(e) { console.warn('Day sync error', e); }
}

// ── 営業時間 ──
function getBH(date) {
  const dow = date.getDay();
  if (dow === 0 || dow === 1) return null;
  return dow === 6 ? { start: 9, end: 19 } : { start: 9, end: 18 };
}

function getTimeOpts(bh) {
  const o = [];
  for (let h = bh.start; h <= bh.end; h++)
    for (let m = 0; m < 60; m += 15) { if (h === bh.end && m > 0) break; o.push(`${h}:${String(m).padStart(2,'0')}`); }
  return o;
}

function getLabelW() {
  const w = window.innerWidth;
  if (w <= 480) return 70;
  if (w <= 768) return 90;
  return 120;
}

// ── レンダリング ──
function renderHeader() {
  const d = currentDate;
  document.getElementById('dateDisplay').textContent = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
  const dow = DOW[d.getDay()];
  const el = document.getElementById('dowDisplay');
  el.textContent = `(${dow})`;
  el.style.color = d.getDay() === 0 ? 'var(--danger)' : d.getDay() === 6 ? 'var(--accent-light)' : 'var(--text-secondary)';
  document.getElementById('datePicker').value = dateKey(d);
}

let shiftOpen = false;

// スタッフ並び順: 出勤>休み、正社員>パート>先生(敏絵)
const STAFF_RANK = { 's1': 1, 's9': 2, 's2': 3, 's3': 4, 's5': 5, 's4': 6 }; // 琴音,朝倉(正社員) → リン,西村,林(パート) → 敏絵(先生)
function renderStaffStatus() {
  const bar = document.getElementById('staffStatusBar');
  bar.innerHTML = '';
  const sorted = [...staff].sort((a, b) => {
    const aShift = getStaffShift(a.id, currentDate) ? 0 : 1;
    const bShift = getStaffShift(b.id, currentDate) ? 0 : 1;
    if (aShift !== bShift) return aShift - bShift;
    return (STAFF_RANK[a.id] || 99) - (STAFF_RANK[b.id] || 99);
  });
  sorted.forEach(s => {
    const shift = getStaffShift(s.id, currentDate);
    const chip = document.createElement('span');
    chip.className = 'staff-chip' + (shift ? '' : ' inactive');
    chip.style.background = s.color;
    chip.textContent = s.name.split(' ')[0];
    chip.addEventListener('click', e => { e.stopPropagation(); openStaffModal(s); });
    bar.appendChild(chip);
  });
  const label = document.createElement('span');
  label.className = 'staff-status-label';
  label.innerHTML = `出勤を表示 <span class="staff-toggle-icon">▼</span>`;
  label.addEventListener('click', e => { e.stopPropagation(); toggleShift(); });
  bar.appendChild(label);
  if (shiftOpen) bar.classList.add('open');
  else bar.classList.remove('open');
}

function openStaffModal(s, targetDate) {
  const date = targetDate || currentDate;
  const bh = getBH(date);
  const shift = getStaffShift(s.id, date);
  const dow = DOW[date.getDay()];
  const dk = dateKey(date);
  let html = `<div class="modal-header" style="border-left-color:${s.color}">
    <span class="modal-title">${s.name}</span>
    <button class="modal-close" onclick="closeModal('staffModal')">&times;</button>
  </div><div class="modal-body">`;

  // 本日のシフト編集
  html += `<div class="form-group"><label>シフト（${date.getMonth()+1}/${date.getDate()} ${dow}）</label>`;
  if (!bh) {
    html += `<div style="font-size:14px;color:var(--text-muted);padding:8px 0">定休日</div>`;
  } else {
    // 時間選択肢を生成
    const timeOpts = [];
    for (let h = 8; h <= 20; h++) timeOpts.push(`${h}:00`);
    const startVal = shift ? `${shift.start}:00` : `${bh.start}:00`;
    const endVal = shift ? `${shift.end}:00` : `${bh.end}:00`;
    html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0">`;
    html += `<select id="shiftStart" style="font-size:14px;padding:6px;border:1.5px solid var(--border-default);border-radius:8px">`;
    timeOpts.forEach(t => { html += `<option value="${t}" ${t===startVal?'selected':''}>${t}</option>`; });
    html += `</select><span>〜</span>`;
    html += `<select id="shiftEnd" style="font-size:14px;padding:6px;border:1.5px solid var(--border-default);border-radius:8px">`;
    timeOpts.forEach(t => { html += `<option value="${t}" ${t===endVal?'selected':''}>${t}</option>`; });

}

// ── シフトCRUD ──
async function saveShift(staffId, date) {
  const startEl = document.getElementById('shiftStart');
  const endEl = document.getElementById('shiftEnd');
  if (!startEl || !endEl) return;
  const startTime = startEl.value;
  const endTime = endEl.value;
  if (parseInt(startTime) >= parseInt(endTime)) { alert('終了時間は開始時間より後にしてください'); return; }

  if (!confirm(`${staff.find(s=>s.id===staffId).name} のシフトを ${startTime}〜${endTime} に設定しますか？`)) return;

  // 既存シフトを探す
  const existing = dayShifts.find(s => s.staffId === staffId && s.date === date);
  const shiftId = existing ? existing.id : 'sh' + Date.now();

  // localStorageに即反映
  const shiftObj = { id: shiftId, staffId, date, start: startTime.split(':')[0], end: endTime.split(':')[0], isOff: false };
  dayShifts = dayShifts.filter(s => !(s.staffId === staffId && s.date === date));
  dayShifts.push(shiftObj);
  const allShifts = lsLoad('shifts', {});
  allShifts[date] = dayShifts;
  lsSave('shifts', allShifts);

  // Supabaseに保存
  await sbUpsert('yoyaku_shifts', {
    id: shiftId, staff_id: staffId, date, start_time: startTime, end_time: endTime,
    is_off: false, updated_at: new Date().toISOString()
  });

  closeModal('staffModal');
  renderAll();
}

async function deleteShift(staffId, date) {
  const s = staff.find(x => x.id === staffId);
  if (!confirm(`${s.name} を ${date} 休みにしますか？`)) return;

  // is_off=trueのレコードをupsert（デフォルトシフトを上書きするため）
  const existing = dayShifts.find(sh => sh.staffId === staffId && sh.date === date);
  const shiftId = existing ? existing.id : 'sh' + Date.now();
  const offObj = { id: shiftId, staffId, date, start: '0', end: '0', isOff: true };

  dayShifts = dayShifts.filter(sh => !(sh.staffId === staffId && sh.date === date));
  dayShifts.push(offObj);
  const allShifts = lsLoad('shifts', {});
  allShifts[date] = dayShifts;
  lsSave('shifts', allShifts);

  await sbUpsert('yoyaku_shifts', {
    id: shiftId, staff_id: staffId, date, start_time: '0:00', end_time: '0:00',
    is_off: true, updated_at: new Date().toISOString()
  });

  closeModal('staffModal');
  renderAll();
}

async function moveShift(staffId, fromDate) {
  const toDateEl = document.getElementById('shiftMoveDate');
  if (!toDateEl) return;
  const toDate = toDateEl.value;
  if (toDate === fromDate) { alert('同じ日です'); return; }

  const s = staff.find(x => x.id === staffId);
  const shift = getStaffShift(staffId, new Date(fromDate + 'T00:00:00'));
  if (!shift) { alert('移動元にシフトがありません'); return; }

  if (!confirm(`${s.name} のシフトを ${fromDate} → ${toDate} に移動しますか？`)) return;

  // 元のシフトを削除
  const existing = dayShifts.find(sh => sh.staffId === staffId && sh.date === fromDate);
  dayShifts = dayShifts.filter(sh => !(sh.staffId === staffId && sh.date === fromDate));
  const allShifts = lsLoad('shifts', {});
  allShifts[fromDate] = dayShifts;
  lsSave('shifts', allShifts);
  if (existing) {
    await sbDelete('yoyaku_shifts', `id=eq.${existing.id}`);
  }

  // 新しい日にシフトを作成
  const newId = 'sh' + Date.now();
  await sbUpsert('yoyaku_shifts', {
    id: newId, staff_id: staffId, date: toDate,
    start_time: `${shift.start}:00`, end_time: `${shift.end}:00`,
    updated_at: new Date().toISOString()
  });

  closeModal('staffModal');
  renderAll();
}

function detectOverlaps(reservations, bh) {
  const result = {};
  const mins = reservations.map(r => {
    const [sh,sm] = r.start.split(':').map(Number);
    const [eh,em] = r.end.split(':').map(Number);
    return { id: r.id, s: (sh - bh.start) * 60 + sm, e: (eh - bh.start) * 60 + em };
  });
  mins.forEach((a, i) => {
    const overlapping = mins.filter((b, j) => j !== i && a.s < b.e && a.e > b.s);
    if (overlapping.length > 0) {
      const group = [a, ...overlapping].sort((x, y) => x.s - y.s || x.id.localeCompare(y.id));
      const idx = group.findIndex(g => g.id === a.id);
      result[a.id] = { index: idx, total: group.length };
    }
  });
  return result;
}

function renderGrid() {
  const wrapper = document.getElementById('gridWrapper');
  const bh = getBH(currentDate);
  if (!bh) {
    wrapper.innerHTML = `<div class="closed-day"><span>定休日</span><span class="closed-sub">${DOW[currentDate.getDay()]}曜日</span></div>`;
    return;
  }

  const labelW = getLabelW();
  const totalH = bh.end - bh.start;

  // Time header (fixed at top)
  let headerHtml = '<div class="time-header-row">';
  headerHtml += `<div class="corner-cell" style="width:${labelW}px"></div>`;
  headerHtml += '<div class="time-header-cells">';
  for (let h = bh.start; h <= bh.end; h++) {
    const pct = (h - bh.start) / totalH * 100;
    headerHtml += `<div class="hour-block" style="left:${pct}%">${h}:00</div>`;
  }
  headerHtml += '</div></div>';

  // Scrollable room rows
  let html = headerHtml + '<div class="grid-table">';
  rooms.forEach(room => {
    const dc = room.divider ? ' section-divider' : '';
    html += `<div class="room-row${dc}">`;
    html += `<div class="room-label" style="width:${labelW}px">${room.name}${room.sub ? '<span class="room-sublabel">'+room.sub+'</span>' : ''}</div>`;
    html += `<div class="time-cells" data-room="${room.id}">`;

    const totalQ = totalH * 4;
    for (let q = 0; q <= totalQ; q++) {
      const pct = q / totalQ * 100;
      let cls = 'grid-line';
      if (q === totalQ) cls += ' end';
      else if (q % 4 === 0) cls += ' hour';
      else if (q % 2 === 0) cls += ' half';
      else cls += ' quarter';
      html += `<div class="${cls}" style="left:${pct}%"></div>`;
    }

    html += `<div class="click-overlay" data-room="${room.id}"></div>`;

    const rr = dayReservations.filter(r => r.roomId === room.id);
    // 重なり検出
    const overlaps = detectOverlaps(rr, bh);
    rr.forEach((res, ri) => {
      const [sh,sm] = res.start.split(':').map(Number);
      const [eh,em] = res.end.split(':').map(Number);
      const sMin = (sh - bh.start) * 60 + sm;
      const eMin = (eh - bh.start) * 60 + em;
      const tMin = totalH * 60;
      const left = sMin / tMin * 100;
      const width = Math.max((eMin - sMin) / tMin * 100, 2);
      const s = res.staffId ? staff.find(st => st.id === res.staffId) : null;
      const color = s ? s.color : '#9CA3AF';
      const type = res.type || 'treatment';
      const isChecked = res.checkedIn;
      const noStaff = !res.staffId;
      const ol = overlaps[res.id] || { index: -1, total: 1 };

      let cls = `reservation type-${type}`;
      if (isChecked) cls += ' checked-in';
      if (noStaff) cls += ' no-staff';
      if (ol.total > 1) cls += ` overlap-${ol.index}`;

      // CSS変数でスタッフ色を渡す
      const colorBg = color + '25'; // 15% alpha
      let style = `left:${left}%;width:${width}%;--res-color:${color};--res-color-bg:${colorBg}`;
      // 重なり時のtop/bottom
      if (ol.total === 2) {
        if (ol.index === 0) style += ';top:2px;bottom:50%';
        else style += ';top:50%;bottom:2px';
      } else if (ol.total >= 3) {
        const h = 100 / ol.total;
        style += `;top:${h * ol.index}%;bottom:${100 - h * (ol.index + 1)}%`;
      }

      html += `<div class="${cls}" style="${style}" data-id="${res.id}">`;
      if (isChecked) html += '<span class="res-checkin">✓</span>';
      if (noStaff) {
        html += `<span class="res-name no-staff-warn">⚠ 未定 ${res.name}</span>`;
      } else {
        html += `<span class="res-name">${res.name}</span>`;
      }
      html += '<div class="res-top">';
      if (type !== 'treatment' && type !== 'shopping') {
        const typeLabels = { break: '休憩', task: '業務', shopping: '🛒' };
        html += `<span class="res-type-tag">${typeLabels[type] || type}</span>`;
      }
      if (res.menu) html += `<span class="res-menu-label">${res.menu}</span>`;
      if (res.memo) html += `<span class="res-memo-tag">${res.memo}</span>`;
      html += '</div>';
      html += '</div>';
      // アフターケア線（予約枠の外、time-cells上に直接配置）
      if (res.aftercareEnd && type === 'treatment') {
        const acStaff = res.aftercareStaffId ? staff.find(st => st.id === res.aftercareStaffId) : s;
        const acColor = acStaff ? acStaff.color : color;
        const [ach, acm] = res.aftercareEnd.split(':').map(Number);
        const acMin = (ach - bh.start) * 60 + acm;
        const acLeft = eMin / tMin * 100;
        const acWidth = Math.max((acMin - eMin) / tMin * 100, 0.5);
        html += `<div class="aftercare-line" style="left:${acLeft}%;width:${acWidth}%;background:${acColor}"></div>`;
      }
    });

    const now = new Date();
    if (dateKey(now) === dateKey(currentDate)) {
      const nd = now.getHours() + now.getMinutes() / 60;
      if (nd >= bh.start && nd <= bh.end) {
        html += `<div class="now-line" style="left:${(nd - bh.start) / totalH * 100}%"></div>`;
      }
    }
    html += '</div></div>';
  });

  html += '</div>';
  wrapper.innerHTML = '<div class="grid-scroll">' + html + '</div>';

  // Events
  wrapper.querySelectorAll('.click-overlay').forEach(ov => {
    ov.addEventListener('click', e => {
      const rect = ov.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      const clickMin = Math.round(pct * totalH * 60 / 15) * 15;
      const h = bh.start + Math.floor(clickMin / 60);
      const m = clickMin % 60;
      openAddModal(ov.dataset.room, h, m, bh);
    });
  });
  wrapper.querySelectorAll('.reservation').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const res = dayReservations.find(r => r.id === el.dataset.id);
      if (res) openViewModal(res);
    });
  });
}

async function saveReservation() {
  const name = document.getElementById('resName').value.trim();
  const isTreatment = currentType === 'treatment' || currentType === 'shopping';
  if (isTreatment && !name) { alert('お客様名を入力してください'); return; }
  const data = {
    id: editingRes ? editingRes.id : 'r' + Date.now(),
    date: dateKey(currentDate),
    name: name || currentType,
    menu: isTreatment ? document.getElementById('resMenu').value.trim() : '',
    staffId: document.getElementById('resStaff').value || '',
    start: document.getElementById('resStart').value,
    end: document.getElementById('resEnd').value,
    roomId: document.getElementById('resRoom').value,
    memo: document.getElementById('resMemo').value.trim(),
    type: currentType,
    checkedIn: document.getElementById('resCheckedIn').checked,
    aftercareEnd: document.getElementById('resAftercareEnd').value || null,
    aftercareStaffId: document.getElementById('resAftercareStaff').value || null,
    subAssignments: getSubAssignments(),
  };

  if (editingRes) {
    dayReservations = dayReservations.map(r => r.id === editingRes.id ? data : r);
  } else {
    dayReservations.push(data);
  }

  closeModal('reservationModal');
  renderGrid();

  // localStorageにキャッシュ保存（即表示用）
  const allRes = lsLoad('reservations', {});
  allRes[dateKey(currentDate)] = dayReservations;
  lsSave('reservations', allRes);
  // Supabaseにも保存
  sbUpsert('yoyaku_reservations', {
    id: data.id, date: data.date, name: data.name, menu: data.menu,
    staff_id: data.staffId || null, start_time: data.start, end_time: data.end,
    room_id: data.roomId, memo: data.memo, type: data.type,
    checked_in: data.checkedIn, aftercare_end: data.aftercareEnd,
    aftercare_staff_id: data.aftercareStaffId,
    sub_assignments: data.subAssignments ? JSON.stringify(data.subAssignments) : null,
    updated_at: new Date().toISOString()
  });
}

async function deleteReservation() {
  if (!editingRes) return;
  if (!confirm(`${editingRes.name} の予約を削除しますか？`)) return;
  const id = editingRes.id;
  dayReservations = dayReservations.filter(r => r.id !== id);
  closeModal('reservationModal');
  renderGrid();

  // localStorageキャッシュ更新
  const allRes = lsLoad('reservations', {});
  allRes[dateKey(currentDate)] = dayReservations;
  lsSave('reservations', allRes);

  sbDelete('yoyaku_reservations', `id=eq.${id}`);
}

// 月間シフトデータのキャッシュ
let calShiftsCache = {};

async function loadMonthShifts(year, month) {
  const key = `${year}-${String(month+1).padStart(2,'0')}`;
  // 月初〜月末
  const firstDay = `${key}-01`;
  const lastDay = new Date(year, month + 1, 0);
  const lastDayStr = `${key}-${String(lastDay.getDate()).padStart(2,'0')}`;
  const data = await sbGet('yoyaku_shifts', `date=gte.${firstDay}&date=lte.${lastDayStr}`);
  if (data) {
    const shifts = data.map(s => ({
      id: s.id, staffId: s.staff_id, date: s.date,
      start: s.start_time, end: s.end_time, isOff: s.is_off
    }));
    calShiftsCache[key] = shifts;
    return shifts;
  }
  return calShiftsCache[key] || [];
}

function getStaffShiftForCal(staffId, date, monthShifts) {
  const dk = dateKey(date);
  const shift = monthShifts.find(s => s.staffId === staffId && s.date === dk);
  if (shift) {
    if (shift.isOff) return null;
    return { start: parseFloat(shift.start), end: parseFloat(shift.end) };
  }
  // フォールバック: デフォルトシフト
  const dow = date.getDay();
  const bh = getBH(date);
  if (!bh) return null;
  switch (staffId) {
    case 's1': case 's9': case 's4': return { start: bh.start, end: bh.end };
    case 's2': return { start: bh.start, end: 17 };
    case 's3': return { start: bh.start, end: 13 };
    case 's5': return dow === 6 ? { start: bh.start, end: bh.end } : null;
    default: return { start: bh.start, end: bh.end };
  }
}

async function renderCalendar() {
  const year = calMonth.getFullYear();
  const month = calMonth.getMonth();
  document.getElementById('calMonthLabel').textContent = `${year}年${month+1}月`;

  // スタッフフィルター更新
  const sel = document.getElementById('calStaffFilter');
  const curVal = sel.value;
  sel.innerHTML = '<option value="all">全スタッフ</option>';
  staff.forEach(s => {
    sel.innerHTML += `<option value="${s.id}" ${curVal===s.id?'selected':''}>${s.name}</option>`;
  });
  if (curVal && curVal !== 'all') sel.value = curVal;
  calStaffFilter = sel.value;

  // シフトデータを取得
  const monthShifts = await loadMonthShifts(year, month);

  const grid = document.getElementById('calendarGrid');
  let html = '';
  // 曜日ヘッダー
  const dowLabels = ['日','月','火','水','木','金','土'];
  dowLabels.forEach((d, i) => {
    html += `<div class="cal-header ${i===0?'sun':''} ${i===6?'sat':''}">${d}</div>`;
  });

  // 月の日付を生成
  const firstDate = new Date(year, month, 1);
  const startDow = firstDate.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  // 前月の末尾
  for (let i = 0; i < startDow; i++) {
    const d = new Date(year, month, -(startDow - 1 - i));
    html += renderCalCell(d, monthShifts, true);
  }
  // 当月
  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(year, month, day);
    html += renderCalCell(d, monthShifts, false);
  }
  // 翌月の頭（6行埋め）
  const totalCells = startDow + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    const d = new Date(year, month + 1, i);
    html += renderCalCell(d, monthShifts, true);
  }

  grid.innerHTML = html;

  // セルクリックイベント
  grid.querySelectorAll('.cal-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const d = new Date(cell.dataset.date + 'T00:00:00');
      // 予約表に切り替えてその日に移動
      goToDate(d);
      document.querySelectorAll('.header-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-page="schedule"]').classList.add('active');
      document.querySelectorAll('.page-content').forEach(p => p.style.display = 'none');
      document.getElementById('page-schedule').style.display = 'flex';
      currentPage = 'schedule';
    });
  });
}

function renderCalCell(date, monthShifts, isOther) {
  const dk = dateKey(date);
  const dow = date.getDay();
  const bh = getBH(date);
  const isToday = dk === dateKey(new Date());
  const isClosed = !bh;

  let cls = 'cal-cell';
  if (isOther) cls += ' other-month';
  if (isToday) cls += ' today';
  if (isClosed) cls += ' closed';

  let html = `<div class="${cls}" data-date="${dk}">`;
  html += `<div class="cal-day ${dow===0?'sun':''} ${dow===6?'sat':''}">${date.getDate()}</div>`;

  if (!isClosed) {
    const showStaff = calStaffFilter === 'all' ? staff : staff.filter(s => s.id === calStaffFilter);
    html += `<div class="cal-dots">`;
    showStaff.forEach(s => {
      const shift = getStaffShiftForCal(s.id, date, monthShifts);
      if (shift) {
        html += `<div class="cal-name" style="background:${s.color}">${s.name.split(' ')[0]}</div>`;
      }
    });
    html += `</div>`;
  } else {
    html += `<div style="font-size:9px;color:var(--text-muted)">休</div>`;
  }
  html += `</div>`;
  return html;
}

async function renderNotifications() {
  const today = dateKey(new Date());
  // チェックリストの未完了を表示
  const taskDiv = document.getElementById('notifTasks');
  const unchecked = checks.filter(c => !dayCheckStates[c.id]);
  if (unchecked.length > 0) {
    taskDiv.innerHTML = unchecked.map(c =>
      `<div class="notif-item"><span class="notif-icon">&#9744;</span><span class="notif-text">${c.label}</span></div>`
    ).join('');
  } else {
    taskDiv.innerHTML = '<div class="notif-empty">すべて完了しています</div>';
  }

  // 当日の予約からリマインドを表示
  const reminderDiv = document.getElementById('notifReminders');
  const todayRes = dayReservations.filter(r => r.memo && r.memo.trim());
  if (todayRes.length > 0) {
    reminderDiv.innerHTML = todayRes.map(r =>
      `<div class="notif-item"><span class="notif-icon">&#128276;</span><span class="notif-text"><strong>${r.name}</strong>（${r.start}〜）: ${r.memo}</span></div>`
    ).join('');
  } else {
    reminderDiv.innerHTML = '<div class="notif-empty">本日のリマインドはありません</div>';
  }
}

// ── 初期化 ──
function renderAll() { renderHeader(); renderStaffStatus(); renderShiftBars(); renderGrid(); }

function init() {
  setupLandscape();
  // 1. localStorageから即表示（0秒）
  loadConfigFromCache();
  loadDayDataFromCache();
  renderAll();
  document.getElementById('loadingOverlay').classList.add('hidden');
  requestAnimationFrame(() => { setTimeout(() => renderAll(), 50); });
  // 2. バックグラウンドでAPIから最新データを取得→反映
  syncConfigFromApi();
  syncDayDataFromApi();
}

init();

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
