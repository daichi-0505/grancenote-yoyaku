<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2C3E6B">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>予約帳 - グランセノーテ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg-primary:     #FFFFFF;
  --bg-card:        #FFFFFF;
  --border-default: #E8EAF0;
  --border-focus:   #2C3E6B;
  --text-primary:   #2D3142;
  --text-secondary: #6B7280;
  --text-muted:     #9CA3AF;
  --accent:         #2C3E6B;
  --accent-light:   #4A6FA5;
  --accent-glow:    rgba(44,62,107,0.10);
  --success:        #10B981;
  --warning:        #F59E0B;
  --danger:         #EF4444;
  --gradient-cta:   linear-gradient(135deg, #2C3E6B 0%, #4A6FA5 100%);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { height: 100dvh; width: 100dvw; overflow: hidden; }
body {
  font-family: -apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
  background: var(--bg-primary); overflow: hidden;
  height: 100%; width: 100%; display: flex; flex-direction: column;
  color: var(--text-primary);
  padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
}


/* 縦持ち / 画面ロック時:「横にしてください」表示 */
.portrait-overlay {
  position: fixed; inset: 0; background: #fff;
  z-index: 998; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; color: var(--accent);
}
.portrait-overlay .rotate-icon {
  font-size: 48px; animation: rotateHint 2s ease-in-out infinite;
}
@keyframes rotateHint {
  0%,100% { transform: rotate(0deg); }
  50% { transform: rotate(90deg); }
}
.portrait-overlay .rotate-text { font-size: 16px; font-weight: 800; letter-spacing: 1px; }

/* ── Loading ── */
.loading-overlay {
  position: fixed; inset: 0; background: var(--bg-primary);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 999; gap: 16px;
}
.loading-overlay.hidden { display: none; }
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border-default);
  border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text-muted); font-weight: 600; }
.sync-indicator {
  position: fixed; top: var(--safe-top); left: 0; right: 0; height: 3px;
  background: var(--accent-light); z-index: 500;
  animation: syncPulse 1s ease-in-out infinite; display: none;
}
.sync-indicator.active { display: block; }
@keyframes syncPulse { 0%,100% { opacity: .3; } 50% { opacity: 1; } }
.offline-banner {
  background: var(--warning); color: #fff; text-align: center;
  padding: 4px 8px; font-size: 12px; font-weight: 700; display: none;
}
.offline-banner.active { display: block; }

/* ── Header ── */
.header {
  background: var(--bg-card);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; z-index: 100;
  border-bottom: 2px solid var(--border-default);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  gap: 8px; flex-wrap: wrap;
}
.header-left { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.header-date { font-size: 20px; font-weight: 900; color: var(--accent); letter-spacing: 1px; white-space: nowrap; }
.header-dow { font-size: 16px; font-weight: 800; margin-left: 2px; }
.nav-btn {
  width: 36px; height: 36px; border: 1.5px solid var(--border-default); border-radius: 10px;
  background: var(--bg-card); color: var(--accent); font-size: 18px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: all .15s; flex-shrink: 0;
}
.nav-btn:active { background: var(--accent-glow); border-color: var(--accent); }
.today-btn {
  padding: 6px 14px; border: 1.5px solid var(--accent); border-radius: 10px;
  background: var(--bg-card); color: var(--accent); font-size: 13px; font-weight: 800;
  cursor: pointer; letter-spacing: 1px; transition: all .15s; flex-shrink: 0;
}
.today-btn:active { background: var(--accent); color: #fff; }
.date-select-btn { display: none; }
@media (min-width: 1024px) { .date-select-btn { display: inline-flex; } }
.header-tabs { display: flex; gap: 4px; flex: 1; justify-content: center; }
.header-tab {
  padding: 5px 12px; border: 1.5px solid var(--border-default); border-radius: 8px;
  background: var(--bg-card); color: var(--text-muted); font-size: 12px; font-weight: 800;
  cursor: pointer; letter-spacing: 0.5px; transition: all .15s; white-space: nowrap;
}
.header-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.header-tab:active { opacity: 0.8; }
.header-right { display: flex; gap: 6px; flex-shrink: 0; }

/* ── Calendar Page ── */
.calendar-controls {
  display: flex; align-items: center; gap: 10px; padding: 8px 16px;
  border-bottom: 1px solid var(--border-default); flex-shrink: 0;
}
.calendar-month-label { font-size: 16px; font-weight: 900; color: var(--accent); min-width: 120px; text-align: center; }
.calendar-staff-filter {
  margin-left: auto; padding: 5px 10px; border: 1.5px solid var(--border-default);
  border-radius: 8px; font-size: 12px; font-weight: 700; background: var(--bg-card); color: var(--text-primary);
}
.calendar-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 1px; background: var(--border-default); flex: 1; overflow-y: auto;
  padding-bottom: var(--safe-bottom);
}
.cal-header {
  background: var(--bg-card); padding: 4px; text-align: center;
  font-size: 11px; font-weight: 800; color: var(--text-secondary);
  position: sticky; top: 0; z-index: 1;
}
.cal-header.sun { color: var(--danger); }
.cal-header.sat { color: var(--accent-light); }
.cal-cell {
  background: var(--bg-card); padding: 3px 4px; min-height: 60px;
  cursor: pointer; transition: background .1s; position: relative;
}
.cal-cell:active { background: var(--accent-glow); }
.cal-cell.other-month { opacity: 0.3; }
.cal-cell.today { box-shadow: inset 0 0 0 2px var(--accent); }
.cal-cell.closed { background: #F9FAFB; }
.cal-day { font-size: 11px; font-weight: 800; margin-bottom: 2px; }
.cal-day.sun { color: var(--danger); }
.cal-day.sat { color: var(--accent-light); }
.cal-dots { display: flex; flex-wrap: wrap; gap: 2px; }
.cal-dot {
  width: 18px; height: 5px; border-radius: 2px; font-size: 0;
}
.cal-name {
  font-size: 8px; font-weight: 700; color: #fff; line-height: 1;
  padding: 1px 2px; border-radius: 2px; white-space: nowrap; overflow: hidden;
}

/* ── Notification Page ── */
.notif-section { padding: 12px 16px; }
.notif-title { font-size: 14px; font-weight: 900; color: var(--accent); margin-bottom: 8px; letter-spacing: 1px; }
.notif-list { display: flex; flex-direction: column; gap: 6px; }
.notif-empty { font-size: 13px; color: var(--text-muted); padding: 12px; text-align: center; }
.notif-item {
  padding: 10px 12px; border: 1.5px solid var(--border-default); border-radius: 10px;
  background: var(--bg-card); display: flex; align-items: center; gap: 10px;
}
.notif-icon { font-size: 18px; flex-shrink: 0; }
.notif-text { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.notif-badge {
  background: var(--danger); color: #fff; font-size: 10px; font-weight: 800;
  padding: 1px 5px; border-radius: 10px; position: absolute; top: -2px; right: -2px;
}

/* Page content */
.page-content { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.settings-btn {
  padding: 6px 12px; border: 1.5px solid var(--border-default); border-radius: 10px;
  background: var(--bg-card); color: var(--text-primary); font-size: 13px; font-weight: 700;
  display: flex; align-items: center; gap: 4px; cursor: pointer; flex-shrink: 0;
}
.settings-btn:active { background: var(--accent-glow); }
.refresh-btn {
  padding: 6px 10px; border: 1.5px solid var(--border-default); border-radius: 10px;
  background: var(--bg-card); color: var(--text-primary); font-size: 16px;
  cursor: pointer; flex-shrink: 0;
}
.refresh-btn:active { background: var(--accent-glow); }

/* ── Closed day ── */
.closed-day {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800; color: var(--text-muted); background: var(--bg-primary); gap: 8px;
}
.closed-sub { font-size: 13px; font-weight: 600; }

/* ── Checklist ── */
.checklist-bar {
  background: var(--bg-card); border-bottom: 1px solid var(--border-default);
  padding: 6px 16px; display: flex; gap: 16px; flex-shrink: 0; overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.check-item {
  display: flex; align-items: center; gap: 5px; font-size: 13px;
  color: var(--text-primary); font-weight: 700; white-space: nowrap; cursor: pointer;
}
.check-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }

/* ── Grid ── */
.grid-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; padding: 0 12px 8px 12px; }
.grid-scroll { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.grid-scroll.scrollable { overflow-y: auto; -webkit-overflow-scrolling: touch; }
.grid-scroll.scrollable .grid-table { flex: none; }
.grid-scroll.scrollable .room-row { height: 44px; flex: none; }
.grid-table { display: flex; flex-direction: column; width: 100%; border: 2px solid var(--accent); border-radius: 6px; overflow: hidden; flex: 1; }

/* Memo space */
.memo-space { display: none; }

/* スタッフ出勤状況 */
.staff-status-bar {
  background: var(--bg-card); border-bottom: 1px solid var(--border-default);
  padding: 2px 12px; display: flex; gap: 6px; flex-shrink: 0; align-items: center;
  cursor: pointer; user-select: none;
}
.staff-status-label {
  font-size: 10px; font-weight: 800; color: var(--text-muted); letter-spacing: 1px;
  white-space: nowrap; display: flex; align-items: center; gap: 4px;
}
.staff-toggle-icon {
  font-size: 8px; transition: transform 0.2s;
}
.staff-status-bar.open .staff-toggle-icon { transform: rotate(180deg); }
.staff-chip {
  display: flex; align-items: center; gap: 3px; padding: 2px 8px;
  border-radius: 10px; font-size: 10px; font-weight: 800;
  border: none; color: #fff; white-space: nowrap;
}
.staff-chip.inactive { background: #D1D5DB !important; color: #9CA3AF !important; opacity: 0.7; }

/* シフトバー（アコーディオン） */
.shift-area {
  max-height: 0; overflow: hidden; transition: max-height 0.25s ease;
  flex-shrink: 0; background: var(--bg-card);
  border-bottom: 1px solid transparent;
}
.shift-area.open {
  max-height: 300px;
  border-bottom-color: var(--border-default);
}
.shift-bar-row {
  display: flex; flex-shrink: 0; height: 18px;
}
.shift-bar-cells { flex: 1; position: relative; margin-right: 20px; }
.shift-line {
  position: absolute; top: 3px; height: 12px;
  border-radius: 6px; opacity: 0.85;
  display: flex; align-items: center; padding-left: 4px;
  font-size: 8px; font-weight: 800; color: #fff; overflow: hidden; white-space: nowrap;
}

@media (min-width: 768px) {
  .staff-status-bar { padding: 4px 16px; gap: 8px; }
  .staff-chip { padding: 3px 10px; font-size: 12px; }
  .staff-status-label { font-size: 12px; }
  .shift-bar-row { height: 22px; }
  .shift-line { top: 3px; height: 16px; font-size: 9px; padding-left: 6px; }
  /* iPad: 練習・業務・休憩の線と文字を少し太く */
  .practice-line { height: 8px; border-radius: 3px; }
  .practice-lines { gap: 3px; }
  .reservation.type-task { border-bottom-width: 8px; }
  .reservation.type-break { border-bottom-width: 7px; }
  .res-type-tag { font-size: 14px; padding: 1px 6px; }
}

/* Time header（枠の外） */
.time-header-row {
  display: flex; flex-shrink: 0; height: 20px;
  background: transparent;
}
.corner-cell {
  flex-shrink: 0;
  background: transparent;
}
.time-header-cells { flex: 1; display: flex; position: relative; margin-right: 20px; }
.hour-block {
  position: absolute; bottom: 0; height: 100%;
  display: flex; align-items: flex-end; justify-content: center;
  font-size: 11px; font-weight: 800; color: var(--text-secondary); letter-spacing: 0.5px;
  transform: translateX(-50%); padding-bottom: 1px;
}

/* Room rows */
.room-row {
  display: flex; height: 44px; flex-shrink: 0;
  border-bottom: 1px solid var(--border-default);
}
/* シフト閉じてる時: 画面に合わせて伸縮 */
.grid-scroll:not(.scrollable) .room-row {
  flex: 1; min-height: 34px; height: auto;
}
.room-row.section-divider { border-top: 2.5px solid var(--accent); }
.room-label {
  flex-shrink: 0;
  background: var(--bg-card);
  border-right: 1px solid var(--border-default);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 2px 4px; font-size: 11px; font-weight: 800; color: var(--text-primary);
  border-left: 3px solid var(--accent);
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  line-height: 1.2;
}
.room-sublabel { font-size: 10px; color: var(--text-secondary); font-weight: 700; }
.time-cells { flex: 1; position: relative; background: var(--bg-card); margin-right: 20px; }

/* Grid lines */
.grid-line {
  position: absolute; top: 0; bottom: 0; width: 0;
  pointer-events: none; z-index: 1;
}
.grid-line.hour { border-left: 1.5px solid rgba(44,62,107,0.25); }
.grid-line.quarter { border-left: 1px dashed rgba(44,62,107,0.12); }
.grid-line.half { border-left: 1px dashed rgba(44,62,107,0.12); }
.grid-line.end { border-left: 1.5px solid var(--accent); }

/* Reservations */
.reservation {
  position: absolute; top: 2px; bottom: 2px;
  border-radius: 5px; padding: 2px 4px;
  cursor: pointer; z-index: 3; overflow: hidden;
  display: flex; flex-direction: column; justify-content: center;
  transition: transform .1s;
  touch-action: none;
  -webkit-user-select: none; user-select: none;
}
.reservation:active { transform: scale(0.98); }
/* 種別スタイル */
.reservation.type-treatment {
  border: 2px solid var(--res-color, #888);
  border-left: 4px solid rgba(255,255,255,0.9);
  background: var(--res-color, #888);
  box-shadow: 0 1px 4px rgba(0,0,0,0.10);
}
.reservation.type-treatment .res-name { color: #fff; }
.reservation.type-treatment .res-menu-label { background: rgba(255,255,255,0.3); color: #fff; }
.reservation.type-treatment .res-memo-tag { background: rgba(255,255,255,0.4); color: rgba(0,0,0,0.6); }
.reservation.type-treatment.checked-in {
  opacity: 0.45;
  background: #B0B0B0 !important;
  border-color: #999 !important;
  box-shadow: none;
}
/* 誕生月ネオングロー */
@keyframes birthday-neon {
  0%, 100% { box-shadow: 0 0 4px rgba(255,185,50,0.4), 0 0 12px rgba(255,185,50,0.2); }
  50% { box-shadow: 0 0 8px rgba(255,185,50,0.8), 0 0 20px rgba(255,185,50,0.4), 0 0 30px rgba(255,185,50,0.15); }
}
.reservation.birthday-glow {
  animation: birthday-neon 2s ease-in-out infinite;
  border-color: #FFB932 !important;
}
.reservation.birthday-glow.checked-in { animation: none; }
.reservation.type-break {
  border: none; border-bottom: 4px dashed var(--res-color, #888);
  background: rgba(255,255,255,0.5);
}
.reservation.type-task {
  border: none; border-bottom: 5px solid var(--res-color, #888);
  background: transparent; border-radius: 0;
}
.reservation.type-practice {
  border: none; background: transparent; border-radius: 0;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding-bottom: 0;
}
.reservation.type-practice {
  display: flex; flex-direction: column; justify-content: flex-end;
}
.reservation.type-practice .res-top {
  margin-bottom: 1px;
}
.practice-lines {
  display: flex; flex-direction: column; gap: 2px;
}
.practice-line {
  height: 4px; border-radius: 2px;
}
.reservation.type-block {
  border: 2px solid #9CA3AF; background: repeating-linear-gradient(
    -45deg, rgba(156,163,175,0.15), rgba(156,163,175,0.15) 4px,
    transparent 4px, transparent 8px
  ); border-radius: 4px;
}
.reservation.type-block .res-type-tag { color: #6B7280; background: rgba(156,163,175,0.2); }
.reservation.type-shopping {
  border: 2px solid var(--res-color, #888);
  background: rgba(255,255,255,0.85);
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.practice-menu-selector { display: flex; flex-wrap: wrap; gap: 6px; }
.practice-menu-btn {
  padding: 8px 12px; border: 2px solid var(--border-default); border-radius: 8px;
  background: var(--bg-card); font-size: 13px; font-weight: 700; color: var(--text-secondary); cursor: pointer;
}
.practice-menu-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
.practice-staff-checks { display: flex; flex-wrap: wrap; gap: 8px; }
.practice-staff-check {
  display: flex; align-items: center; gap: 4px; padding: 6px 10px; border: 2px solid var(--border-default);
  border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
}
.practice-staff-check input { width: 16px; height: 16px; }
.practice-staff-check.checked { border-color: var(--accent); background: var(--accent-glow); }
.reservation.no-staff {
  border-color: #9CA3AF !important;
  background: rgba(200,200,200,0.3) !important;
}
.reservation.no-staff .res-name { color: var(--text-primary) !important; }
.reservation.no-staff .res-time-label { color: var(--text-secondary) !important; opacity: 1; }
.reservation.no-staff .res-menu-label { color: var(--text-secondary) !important; background: rgba(0,0,0,0.08) !important; }
/* 重なり表示 */
.reservation.overlap-0 { top: 2px; bottom: 50%; }
.reservation.overlap-1 { top: 50%; bottom: 2px; }
.reservation.overlap-2 { top: 2px; bottom: 66%; }
.reservation.overlap-3 { top: 34%; bottom: 34%; }
.reservation.overlap-4 { top: 66%; bottom: 2px; }
/* チェックイン済み */
.res-checkin { font-size: 10px; position: absolute; top: 1px; right: 3px; }
.res-karte-status { position: absolute; bottom: 1px; right: 2px; font-size: 7px; font-weight: 700; padding: 0 3px; border-radius: 3px; line-height: 1.4; }
.res-ks-none { background: rgba(192,57,43,0.2); color: #C0392B; }
.res-ks-draft { background: rgba(230,126,34,0.2); color: #E67E22; }
.res-ks-done { background: rgba(39,174,96,0.2); color: #27AE60; }
/* ドラッグ中 */
.reservation.dragging { opacity: 0.85; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transform: scale(1.03); pointer-events: none; }
.drag-ghost { position: absolute; z-index: 99; border: 2px dashed var(--accent); border-radius: 5px; background: rgba(196,169,125,0.1); pointer-events: none; }
/* アフターケア線（time-cells上に直接配置） */
.aftercare-line {
  position: absolute; bottom: 4px;
  height: 4px; z-index: 4; pointer-events: none; border-radius: 2px;
}
.res-top { display: flex; align-items: center; gap: 3px; }
.res-bottom { display: flex; align-items: center; gap: 3px; }
.res-time-label { font-size: 9px; font-weight: 700; color: #fff; opacity: 0.85; white-space: nowrap; flex-shrink: 0; }
.res-menu-label {
  font-size: 8px; font-weight: 700; color: #fff;
  background: rgba(0,0,0,0.15); padding: 0 3px; border-radius: 2px;
  line-height: 1.3; white-space: nowrap;
}
.res-duration-label { display: none; }
@media (min-width: 768px) { .res-duration-label { display: inline; } }
.res-memo-tag {
  font-size: 9px; font-weight: 700; color: rgba(0,0,0,0.5);
  background: rgba(255,255,255,0.5); padding: 0 3px; border-radius: 3px;
}
.res-type-tag {
  font-size: 13px; font-weight: 800; color: var(--text-secondary);
  background: rgba(0,0,0,0.06); padding: 1px 6px; border-radius: 3px;
  white-space: nowrap;
}
.res-name { font-size: 12px; font-weight: 800; color: var(--text-primary); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.res-name.no-staff-warn { color: var(--danger); font-size: 10px; }
/* 種別選択ボタン */
.type-selector { display: flex; gap: 6px; padding: 8px 0; flex-wrap: wrap; }
.type-btn {
  flex: 1; min-width: 70px; padding: 10px 8px; border: 2px solid var(--border-default); border-radius: 10px;
  background: var(--bg-card); font-size: 13px; font-weight: 800; color: var(--text-secondary);

.detail-toggle {
  display: flex; align-items: center; gap: 4px; padding: 8px 0;

  border: none; background: none;
}
.detail-toggle .arrow { transition: transform .2s; }

.detail-section { display: none; padding: 8px 0; }
.detail-section.open { display: block; }
.sub-assignment {

}
.sub-assignment:last-child { border: none; }

.now-line {

}
.now-line::before {

/* ── 空き枠検索 ── */

<script>
// ── Supabase設定（公式ライブラリ使用） ──
const SUPABASE_URL = 'https://lheojchyrxjlagxfbgjo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sV418nh9Akoc0EnxchRU4g_H2FFAa-4';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let AUTH_TOKEN = null;

// トークン自動更新: ライブラリが自動でrefreshしてくれる
supabaseClient.auth.onAuthStateChange((event, session) => {
  AUTH_TOKEN = session?.access_token || null;
});

function getSbHeaders(contentType) {
  const h = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + (AUTH_TOKEN || SUPABASE_KEY) };
  if (contentType) h['Content-Type'] = contentType;
  return h;
}
function getSbHeadersFull() {
  return { ...getSbHeaders('application/json'), 'Prefer': 'return=minimal' };
}

// ── ログイン認証 ──
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  errEl.textContent = '';
  if (!email || !pw) { errEl.textContent = '入力してください'; return; }
  btn.disabled = true;
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pw });
  if (error) { errEl.textContent = 'メールアドレスまたはパスワードが違います'; btn.disabled = false; return; }
  document.getElementById('login-screen').classList.add('hidden');
  btn.disabled = false;
  syncConfigFromApi();
  syncDayDataFromApi();
}

async function refreshSession() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) { AUTH_TOKEN = session.access_token; return true; }
  return false;
}

// 書き込み前にトークンを確認（RLSがauthenticatedのみ許可のため、anon keyだと204返るが0行更新になる）
async function ensureAuth() {
  if (!AUTH_TOKEN) await refreshSession();
  if (!AUTH_TOKEN) { alert('ログインが切れました。再ログインしてください。'); return false; }
  return true;
}

// allShiftsCache: 週間表示用に複数日のシフトをキャッシュ
let dayShifts = [];
let allShiftsCache = {};
function getStaffShift(staffId, date) {
  const dk = dateKey(date);
  // まず現在の日のdayShiftsを確認、次にキャッシュ
  const shifts = dk === dateKey(currentDate) ? dayShifts : (allShiftsCache[dk] || []);
  const shift = shifts.find(s => s.staffId === staffId && s.date === dk);
  if (shift) {
    // is_off=trueなら明示的に休み
    if (shift.isOff) return null;
    return { start: parseFloat(shift.start), end: parseFloat(shift.end) };
  }
  // フォールバック: デフォルトシフト（Supabaseにデータがない場合）
  const dow = date.getDay();
  const bh = getBH(date);
  if (!bh) return null;
  switch (staffId) {
    case 's1': case 's9': case 's4':
      return { start: bh.start, end: bh.end };
    case 's2': return { start: bh.start, end: 17 };
    case 's3': return { start: bh.start, end: 13 };
    case 's5': return dow === 6 ? { start: bh.start, end: bh.end } : null;
    default: return { start: bh.start, end: bh.end };
  }
}

// ── Supabase API通信 ──
function showSync(on) {
  syncing = on;
  document.getElementById('syncIndicator').classList.toggle('active', on);
}

async function sbGet(table, query = '') {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, { headers: getSbHeaders() });
    if (!res.ok) throw new Error(`${res.status}`);
    return await res.json();
  } catch(e) { console.warn('Supabase GET error:', e); return null; }
}

async function sbPost(table, data) {
  showSync(true);
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST', headers: { ...getSbHeadersFull(), 'Prefer': 'return=representation,resolution=merge-duplicates' }, body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
    return await res.json();
  } catch(e) { console.error('Supabase POST error:', e); return null; }
  finally { showSync(false); }
}

async function sbDelete(table, query) {
  if (!await ensureAuth()) return false;
  showSync(true);
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
      method: 'DELETE', headers: getSbHeadersFull()
    });
    if (!res.ok) throw new Error(`${res.status}`);
    return true;
  } catch(e) { console.error('Supabase DELETE error:', e); return false; }
  finally { showSync(false); }
}

async function sbUpsert(table, data) {
  if (!await ensureAuth()) return false;
  showSync(true);
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST', headers: { ...getSbHeadersFull(), 'Prefer': 'return=minimal,resolution=merge-duplicates' }, body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
    return true;
  } catch(e) { console.error('Supabase UPSERT error:', e); return false; }
  finally { showSync(false); }
}

// snake_case <-> camelCase 変換
function snakeToCamel(obj) {
  const r = {};
  for (const k in obj) {
    const ck = k.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
    r[ck] = obj[k];
  }
  return r;
}

function lsSave(key, data) { localStorage.setItem('rs_' + key, JSON.stringify(data)); }

let dayKarteStatusMap = {}; // customer_id → karte status for current date
let dayCustomerInfoMap = {}; // customer_id → {birthday, is_new, membership_plan}

async function syncDayDataFromApi() {
  if (savingInProgress) return; // 保存中はsyncしない（古いデータで上書き防止）
  const dk = dateKey(currentDate);
  try {
    const [resData, stateData, shiftData, karteData] = await Promise.all([
      sbGet('yoyaku_reservations', `date=eq.${dk}`),
      sbGet('yoyaku_check_states', `date=eq.${dk}`),
      sbGet('yoyaku_shifts', `date=eq.${dk}`),
      sbGet('karte_records', `date=eq.${dk}&select=customer_id,status`),
    ]);
    // カルテステータスマップ構築
    dayKarteStatusMap = {};
    if (karteData) {
      karteData.forEach(kr => {
        const prev = dayKarteStatusMap[kr.customer_id];
        if (!prev || kr.status === 'complete') dayKarteStatusMap[kr.customer_id] = kr.status || 'complete';
      });
    }
    if (resData) {
      dayReservations = resData.map(r => ({
        id: r.id, date: r.date, name: r.name, menu: r.menu || '',
        staffId: r.staff_id || '', start: r.start_time, end: r.end_time,
        roomId: r.room_id, memo: r.memo || '', updatedAt: r.updated_at,
        type: r.type || 'treatment', checkedIn: r.checked_in || false,
        aftercareEnd: r.aftercare_end || null,
        aftercareStaffId: r.aftercare_staff_id || null,
        subAssignments: r.sub_assignments ? (typeof r.sub_assignments === 'string' ? JSON.parse(r.sub_assignments) : r.sub_assignments) : null,
        practiceStaffIds: r.practice_staff_ids ? (typeof r.practice_staff_ids === 'string' ? JSON.parse(r.practice_staff_ids) : r.practice_staff_ids) : null,
        blockRoomIds: r.block_room_ids ? (typeof r.block_room_ids === 'string' ? JSON.parse(r.block_room_ids) : r.block_room_ids) : null,
        blockStaffIds: r.block_staff_ids ? (typeof r.block_staff_ids === 'string' ? JSON.parse(r.block_staff_ids) : r.block_staff_ids) : null,
        customerId: r.customer_id || null,
      }));
      const allRes = lsLoad('reservations', {});
      allRes[dk] = dayReservations;
      lsSave('reservations', allRes);
      // 顧客情報取得（誕生月バッジ用）
      const cids = dayReservations.filter(r => r.customerId).map(r => r.customerId);
      dayCustomerInfoMap = {};
      if (cids.length > 0) {
        const custs = await sbGet('customers', `id=in.(${[...new Set(cids)].join(',')})&select=id,birthday,is_new,membership_plan,default_duration`);
        if (custs) custs.forEach(c => { dayCustomerInfoMap[c.id] = c; });
      }
    }
    if (stateData) {
      dayCheckStates = {};
      stateData.forEach(s => { dayCheckStates[s.check_id] = s.checked; });
      const allStates = lsLoad('checkstates', {});
      allStates[dk] = dayCheckStates;
      lsSave('checkstates', allStates);
    }
    if (shiftData) {
      dayShifts = shiftData.map(s => ({
        id: s.id, staffId: s.staff_id, date: s.date,
        start: s.start_time, end: s.end_time, isOff: s.is_off
      }));
      const allShifts = lsLoad('shifts', {});
      allShifts[dk] = dayShifts;
      lsSave('shifts', allShifts);
    }
    renderAll();
  } catch(e) { console.warn('Day sync error', e); }
}

// ── 営業時間 ──
function getBH(date) {
  const dow = date.getDay();
  if (dow === 0 || dow === 1) return null;
  return dow === 6 ? { start: 9, end: 19 } : { start: 9, end: 18 };
}

function getTimeOpts(bh) {
  const o = [];
  for (let h = bh.start; h <= bh.end; h++)
    for (let m = 0; m < 60; m += 5) { if (h === bh.end && m > 0) break; o.push(`${h}:${String(m).padStart(2,'0')}`); }
  return o;
}

function getLabelW() {
  const w = window.innerWidth;
  if (w <= 480) return 70;
  if (w <= 768) return 90;
  return 120;
}

const STAFF_SHORT = { 's4': '先生' };
function shortName(s) { return STAFF_SHORT[s.id] || s.name.replace(' ', ''); }
function renderStaffStatus() {
  const bar = document.getElementById('staffStatusBar');
  bar.innerHTML = '';
  const sorted = [...staff].sort((a, b) => {
    const aShift = getStaffShift(a.id, currentDate) ? 0 : 1;
    const bShift = getStaffShift(b.id, currentDate) ? 0 : 1;
    if (aShift !== bShift) return aShift - bShift;
    return (STAFF_RANK[a.id] || 99) - (STAFF_RANK[b.id] || 99);
  });
  sorted.forEach(s => {
    const shift = getStaffShift(s.id, currentDate);
    const chip = document.createElement('span');
    chip.className = 'staff-chip' + (shift ? '' : ' inactive');

  label.className = 'staff-status-label';
  label.innerHTML = `出勤を表示 <span class="staff-toggle-icon">▼</span>`;

function openStaffModal(s, targetDate) {
  const date = targetDate || currentDate;
  const bh = getBH(date);
  const shift = getStaffShift(s.id, date);
  const dow = DOW[date.getDay()];
  const dk = dateKey(date);
  let html = `<div class="modal-header" style="border-left-color:${s.color}">
    <span class="modal-title">${s.name}</span>
    <button class="modal-close" onclick="closeModal('staffModal')">&times;</button>
  </div><div class="modal-body">`;

  // 本日のシフト編集
  html += `<div class="form-group"><label>シフト（${date.getMonth()+1}/${date.getDate()} ${dow}）</label>`;
  if (!bh) {
    html += `<div style="font-size:14px;color:var(--text-muted);padding:8px 0">定休日</div>`;
  } else {
    // 時間選択肢を生成
    const timeOpts = [];
    for (let h = 8; h <= 20; h++) timeOpts.push(`${h}:00`);
    const startVal = shift ? `${shift.start}:00` : `${bh.start}:00`;
    const endVal = shift ? `${shift.end}:00` : `${bh.end}:00`;
    html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0">`;
    html += `<select id="shiftStart" style="font-size:14px;padding:6px;border:1.5px solid var(--border-default);border-radius:8px">`;
    timeOpts.forEach(t => { html += `<option value="${t}" ${t===startVal?'selected':''}>${t}</option>`; });
    html += `</select><span>〜</span>`;
    html += `<select id="shiftEnd" style="font-size:14px;padding:6px;border:1.5px solid var(--border-default);border-radius:8px">`;
    timeOpts.forEach(t => { html += `<option value="${t}" ${t===endVal?'selected':''}>${t}</option>`; });
    html += `</select></div>`;
    html += `<div style="display:flex;gap:8px;padding:6px 0">`;
    html += `<button class="btn btn-primary" style="font-size:13px;padding:6px 14px" onclick="saveShift('${s.id}','${dk}')">${shift ? '更新' : '出勤を登録'}</button>`;
    if (shift) {
      html += `<button class="btn btn-danger" style="font-size:13px;padding:6px 14px" onclick="deleteShift('${s.id}','${dk}')">休みにする</button>`;
    }
    html += `</div>`;
  }
  html += `</div>`;

  // 今週の勤務予定
  html += `<div class="form-group"><label>今週の勤務予定</label><div style="padding:4px 0">`;
  const weekStart = new Date(date);
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart); d.setDate(d.getDate() + i);
    const sh = getStaffShift(s.id, d);
    const bh2 = getBH(d);
    const isToday = dateKey(d) === dk;
    html += `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;${isToday ? 'font-weight:900;' : ''}cursor:pointer" onclick="openStaffModal(staff.find(x=>x.id==='${s.id}'),new Date('${dateKey(d)}T00:00:00'))">`;
    html += `<span style="width:30px;font-size:12px;color:${d.getDay()===0?'var(--danger)':d.getDay()===6?'var(--accent-light)':'var(--text-secondary)'}">${DOW[d.getDay()]}</span>`;
    html += `<span style="font-size:12px;width:40px">${d.getMonth()+1}/${d.getDate()}</span>`;
    if (!bh2) {
      html += `<span style="font-size:12px;color:var(--text-muted)">定休日</span>`;
    } else if (sh) {
      html += `<span style="font-size:12px;color:var(--success);font-weight:700">${sh.start}:00〜${sh.end}:00</span>`;
    } else {
      html += `<span style="font-size:12px;color:var(--text-muted)">—</span>`;
    }
    html += `</div>`;
  }
  html += `</div></div>`;

  // 別の日にシフトを移動
  html += `<div class="form-group"><label>別の日に移動</label>`;
  html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0">`;
  html += `<input type="date" id="shiftMoveDate" style="font-size:14px;padding:6px;border:1.5px solid var(--border-default);border-radius:8px" value="${dk}">`;
  html += `<button class="btn btn-primary" style="font-size:13px;padding:6px 14px" onclick="moveShift('${s.id}','${dk}')">移動</button>`;
  html += `</div></div>`;

  html += `</div>`;

  let modal = document.getElementById('staffModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'staffModal';
    modal.innerHTML = '<div class="modal"></div>';
    modal.addEventListener('click', e => { if (e.target === modal) closeModal('staffModal'); });
    document.body.appendChild(modal);
  }
  modal.querySelector('.modal').innerHTML = html;
  modal.classList.add('active');
}

// ── シフトCRUD ──
async function saveShift(staffId, date) {
  const startEl = document.getElementById('shiftStart');
  const endEl = document.getElementById('shiftEnd');
  if (!startEl || !endEl) return;
  const startTime = startEl.value;
  const endTime = endEl.value;
  if (parseInt(startTime) >= parseInt(endTime)) { alert('終了時間は開始時間より後にしてください'); return; }

  if (!confirm(`${staff.find(s=>s.id===staffId).name} のシフトを ${startTime}〜${endTime} に設定しますか？`)) return;

  // 既存シフトを探す
  const existing = dayShifts.find(s => s.staffId === staffId && s.date === date);
  const shiftId = existing ? existing.id : 'sh' + Date.now();

  // localStorageに即反映
  const shiftObj = { id: shiftId, staffId, date, start: startTime.split(':')[0], end: endTime.split(':')[0], isOff: false };
  dayShifts = dayShifts.filter(s => !(s.staffId === staffId && s.date === date));
  dayShifts.push(shiftObj);
  const allShifts = lsLoad('shifts', {});
  allShifts[date] = dayShifts;
  lsSave('shifts', allShifts);

  // Supabaseに保存
  await sbUpsert('yoyaku_shifts', {
    id: shiftId, staff_id: staffId, date, start_time: startTime, end_time: endTime,
    is_off: false, updated_at: new Date().toISOString()
  });

  closeModal('staffModal');
  renderAll();
}

async function deleteShift(staffId, date) {
  const s = staff.find(x => x.id === staffId);
  if (!confirm(`${s.name} を ${date} 休みにしますか？`)) return;

  // is_off=trueのレコードをupsert（デフォルトシフトを上書きするため）
  const existing = dayShifts.find(sh => sh.staffId === staffId && sh.date === date);
  const shiftId = existing ? existing.id : 'sh' + Date.now();
  const offObj = { id: shiftId, staffId, date, start: '0', end: '0', isOff: true };

  dayShifts = dayShifts.filter(sh => !(sh.staffId === staffId && sh.date === date));
  dayShifts.push(offObj);
  const allShifts = lsLoad('shifts', {});
  allShifts[date] = dayShifts;
  lsSave('shifts', allShifts);

  await sbUpsert('yoyaku_shifts', {
    id: shiftId, staff_id: staffId, date, start_time: '0:00', end_time: '0:00',
    is_off: true, updated_at: new Date().toISOString()
  });

  closeModal('staffModal');
  renderAll();
}

async function moveShift(staffId, fromDate) {
  const toDateEl = document.getElementById('shiftMoveDate');
  if (!toDateEl) return;
  const toDate = toDateEl.value;
  if (toDate === fromDate) { alert('同じ日です'); return; }

  const s = staff.find(x => x.id === staffId);
  const shift = getStaffShift(staffId, new Date(fromDate + 'T00:00:00'));
  if (!shift) { alert('移動元にシフトがありません'); return; }

  if (!confirm(`${s.name} のシフトを ${fromDate} → ${toDate} に移動しますか？`)) return;

  // 元のシフトを削除
  const existing = dayShifts.find(sh => sh.staffId === staffId && sh.date === fromDate);
  dayShifts = dayShifts.filter(sh => !(sh.staffId === staffId && sh.date === fromDate));
  const allShifts = lsLoad('shifts', {});
  allShifts[fromDate] = dayShifts;
  lsSave('shifts', allShifts);
  if (existing) {
    await sbDelete('yoyaku_shifts', `id=eq.${existing.id}`);
  }

  // 新しい日にシフトを作成
  const newId = 'sh' + Date.now();
  await sbUpsert('yoyaku_shifts', {
    id: newId, staff_id: staffId, date: toDate,
    start_time: `${shift.start}:00`, end_time: `${shift.end}:00`,
    updated_at: new Date().toISOString()
  });

  closeModal('staffModal');
  renderAll();
}

function detectOverlaps(reservations, bh) {
  const result = {};
  const mins = reservations.map(r => {
    const [sh,sm] = r.start.split(':').map(Number);
    const [eh,em] = r.end.split(':').map(Number);
    return { id: r.id, s: (sh - bh.start) * 60 + sm, e: (eh - bh.start) * 60 + em };
  });
  mins.forEach((a, i) => {
    const overlapping = mins.filter((b, j) => j !== i && a.s < b.e && a.e > b.s);
    if (overlapping.length > 0) {
      const group = [a, ...overlapping].sort((x, y) => x.s - y.s || x.id.localeCompare(y.id));
      const idx = group.findIndex(g => g.id === a.id);
      result[a.id] = { index: idx, total: group.length };
    }
  });
  return result;
}

function renderGrid() {
  const wrapper = document.getElementById('gridWrapper');
  const bh = getBH(currentDate);
  if (!bh) {
    wrapper.innerHTML = `<div class="closed-day"><span>定休日</span><span class="closed-sub">${DOW[currentDate.getDay()]}曜日</span></div>`;
    return;
  }

  const labelW = getLabelW();
  const totalH = bh.end - bh.start;

  // Time header (fixed at top)
  let headerHtml = '<div class="time-header-row">';
  headerHtml += `<div class="corner-cell" style="width:${labelW}px"></div>`;
  headerHtml += '<div class="time-header-cells">';
  for (let h = bh.start; h <= bh.end; h++) {
    const pct = (h - bh.start) / totalH * 100;
    headerHtml += `<div class="hour-block" style="left:${pct}%">${h}:00</div>`;
  }
  headerHtml += '</div></div>';

  // Scrollable room rows
  let html = headerHtml + '<div class="grid-table">';
  rooms.forEach(room => {
    const dc = room.divider ? ' section-divider' : '';
    html += `<div class="room-row${dc}">`;
    html += `<div class="room-label" style="width:${labelW}px">${room.name}${room.sub ? '<span class="room-sublabel">'+room.sub+'</span>' : ''}</div>`;
    html += `<div class="time-cells" data-room="${room.id}">`;

    const totalQ = totalH * 6;
    for (let q = 0; q <= totalQ; q++) {
      const pct = q / totalQ * 100;
      let cls = 'grid-line';
      if (q === totalQ) cls += ' end';
      else if (q % 6 === 0) cls += ' hour';
      else if (q % 3 === 0) cls += ' half';
      else cls += ' quarter';
      html += `<div class="${cls}" style="left:${pct}%"></div>`;
    }

    const rr = dayReservations.filter(r => r.roomId === room.id || (r.type === 'block' && r.blockRoomIds && r.blockRoomIds.includes(room.id)));
    // 重なり検出
    const overlaps = detectOverlaps(rr, bh);
    rr.forEach((res, ri) => {
      const [sh,sm] = res.start.split(':').map(Number);
      const [eh,em] = res.end.split(':').map(Number);
      const sMin = (sh - bh.start) * 60 + sm;
      const eMin = (eh - bh.start) * 60 + em;
      const tMin = totalH * 60;
      const left = sMin / tMin * 100;
      const width = Math.max((eMin - sMin) / tMin * 100, 2);
      const s = res.staffId ? staff.find(st => st.id === res.staffId) : null;
      const color = s ? s.color : '#9CA3AF';
      const type = res.type || 'treatment';
      const isChecked = res.checkedIn;
      const noStaff = !res.staffId;
      const ol = overlaps[res.id] || { index: -1, total: 1 };

      let cls = `reservation type-${type}`;
      if (isChecked) cls += ' checked-in';
      if (noStaff) cls += ' no-staff';
      if (ol.total > 1) cls += ` overlap-${ol.index}`;
      // 誕生月グロー
      if (type === 'treatment' && res.customerId) {
        const _bci = dayCustomerInfoMap[res.customerId];
        if (_bci && _bci.birthday && new Date(_bci.birthday).getMonth() + 1 === new Date().getMonth() + 1) cls += ' birthday-glow';
      }

      // CSS変数でスタッフ色を渡す
      const colorBg = color + '25'; // 15% alpha
      let style = `left:${left}%;width:${width}%;--res-color:${color};--res-color-bg:${colorBg}`;
      // 重なり時のtop/bottom
      if (ol.total === 2) {
        if (ol.index === 0) style += ';top:2px;bottom:50%';
        else style += ';top:50%;bottom:2px';
      } else if (ol.total >= 3) {
        const h = 100 / ol.total;
        style += `;top:${h * ol.index}%;bottom:${100 - h * (ol.index + 1)}%`;
      }

      // 分担がある場合、backgroundをグラデーションで色分け
      if (res.subAssignments && Array.isArray(res.subAssignments) && res.subAssignments.length > 0 && type === 'treatment') {
        const totalMin = eMin - sMin;
        if (totalMin > 0) {
          const segs = [];
          res.subAssignments.forEach(sa => {
            if (!sa.start || !sa.end) return;
            const saStaff = staff.find(st => st.id === sa.staffId);
            const [ssh, ssm] = String(sa.start).split(':').map(Number);
            const [seh, sem] = String(sa.end).split(':').map(Number);
            segs.push({
              s: (ssh * 60 + ssm - sh * 60 - sm) / totalMin * 100,
              e: (seh * 60 + sem - sh * 60 - sm) / totalMin * 100,
              c: saStaff ? saStaff.color : color
            });
          });
          segs.sort((a, b) => a.s - b.s);
          const stops = [];
          let prev = 0;
          segs.forEach(sg => {
            if (sg.s > prev) { stops.push(color + ' ' + prev + '%'); stops.push(color + ' ' + sg.s + '%'); }
            stops.push(sg.c + ' ' + sg.s + '%');
            stops.push(sg.c + ' ' + sg.e + '%');
            prev = sg.e;
          });
          if (prev < 100) { stops.push(color + ' ' + prev + '%'); stops.push(color + ' 100%'); }
          if (stops.length > 0) style += ';background:linear-gradient(to right,' + stops.join(',') + ')';
        }
      }

      // 予約枠（背景+文字、タップ可能）
      if (type === 'break' || type === 'practice') {
        // 休憩・練習はタップで新規追加（stopPropagationしない）、長押しで編集
        html += `<div class="${cls}" style="${style}" data-id="${res.id}" data-type="${type}">`;
      } else {
        html += `<div class="${cls}" style="${style}" data-id="${res.id}" onclick="event.stopPropagation();openViewModal(dayReservations.find(r=>r.id==='${res.id}'))">`;
      }
      if (isChecked) html += '<span class="res-checkin">✓</span>';
      html += '<div class="res-top">';
      if (type === 'practice') {
        html += `<span class="res-type-tag">練習</span>`;
        if (res.menu) html += `<span class="res-menu-label">${res.menu}</span>`;
      } else {
        html += `<span class="res-time-label">${res.start}〜</span>`;
        if (type !== 'break' && type !== 'task' && type !== 'block') {
          const ci = res.customerId ? dayCustomerInfoMap[res.customerId] : null;
          const bdMark = (ci && ci.birthday && new Date(ci.birthday).getMonth() + 1 === new Date().getMonth() + 1) ? ' 🎉' : '';
          if (noStaff) {
            html += `<span class="res-name no-staff-warn">⚠ 未定 ${res.name}${bdMark}</span>`;
          } else {
            html += `<span class="res-name">${res.name}${bdMark}</span>`;
          }
        }
      }
      html += '</div>';
      // 練習: ラベルの下にスタッフ色線を並行表示
      if (type === 'practice' && res.practiceStaffIds && res.practiceStaffIds.length > 0) {
        html += '<div class="practice-lines">';
        res.practiceStaffIds.forEach(sid => {
          const ps = staff.find(st => st.id === sid);
          if (ps) html += `<div class="practice-line" style="background:${ps.color}"></div>`;
        });
        html += '</div>';
      }
      html += '<div class="res-bottom">';
      if (type === 'break' || type === 'task' || type === 'block') {
        const typeLabels = { break: '休憩', task: '業務', block: '🚫' };
        html += `<span class="res-type-tag">${typeLabels[type]}</span>`;
      }
      if (type !== 'practice' && res.menu) html += `<span class="res-menu-label">${res.menu}</span>`;
      if (type === 'treatment' || type === 'shopping') {
        const [_sh,_sm] = res.start.split(':').map(Number);
        const [_eh,_em] = res.end.split(':').map(Number);
        const _dur = (_eh*60+_em) - (_sh*60+_sm);
        if (_dur > 0) html += `<span class="res-menu-label res-duration-label">${_dur}分</span>`;
      }
      if (res.memo) html += `<span class="res-memo-tag">${res.memo}</span>`;
      html += '</div>';
      // カルテステータスバッジ（施術のみ、顧客紐付あり）
      if (type === 'treatment' && res.customerId) {
        const ks = dayKarteStatusMap[res.customerId];
        if (ks === 'complete') html += '<span class="res-karte-status res-ks-done">済</span>';
        else if (ks === 'draft') html += '<span class="res-karte-status res-ks-draft">途中</span>';
        else html += '<span class="res-karte-status res-ks-none">未</span>';
      }
      html += '</div>';
      // アフターケア線（予約枠の外、time-cells上に直接配置）
      if (res.aftercareEnd && type === 'treatment') {
        const acStaff = res.aftercareStaffId ? staff.find(st => st.id === res.aftercareStaffId) : s;
        const acColor = acStaff ? acStaff.color : color;
        const [ach, acm] = res.aftercareEnd.split(':').map(Number);
        const acMin = (ach - bh.start) * 60 + acm;
        const acLeft = eMin / tMin * 100;
        const acWidth = Math.max((acMin - eMin) / tMin * 100, 0.5);
        html += `<div class="aftercare-line" data-ac-for="${res.id}" style="left:${acLeft}%;width:${acWidth}%;background:${acColor}"></div>`;
      }
      // 分担表示はグラデーションで処理済み（別要素なし）
    });

    const now = new Date();
    if (dateKey(now) === dateKey(currentDate)) {
      const nd = now.getHours() + now.getMinutes() / 60;
      if (nd >= bh.start && nd <= bh.end) {
        html += `<div class="now-line" style="left:${(nd - bh.start) / totalH * 100}%"></div>`;
      }
    }
    html += '</div></div>';
  });

  html += '</div>';
  wrapper.innerHTML = '<div class="grid-scroll">' + html + '</div>';

  // Events: 空白タップで新規追加 + ドラッグ移動
  const tMin = totalH * 60;
  let dragState = null;
  let pendingDragAction = null; // {ds, newStart, newEnd, newRoomId} for confirm modal

  wrapper.querySelectorAll('.time-cells').forEach(tc => {
    let longPressTimer = null;
    let longPressed = false;
    let dragReady = false;

    tc.addEventListener('pointerdown', function(e) {
      const resEl = e.target.closest('[data-id]');
      if (!resEl) return;
      const res = dayReservations.find(r => r.id === resEl.dataset.id);
      if (!res) return;

      longPressed = false;
      dragReady = false;

      // 施術タイプ: 長押しでドラッグモード
      if (res.type === 'treatment' || res.type === 'shopping') {
        longPressTimer = setTimeout(() => {
          dragReady = true;
          longPressed = true;
          // ドラッグ開始
          const tcRect = tc.getBoundingClientRect();
          resEl.classList.add('dragging');
          resEl.style.transition = 'none';
          const acLine = tc.querySelector(`[data-ac-for="${res.id}"]`);
          dragState = {
            res, el: resEl, startX: e.clientX, startY: e.clientY,
            origLeft: parseFloat(resEl.style.left),
            origWidth: parseFloat(resEl.style.width),
            roomId: tc.dataset.room,
            origRoomId: tc.dataset.room,
            tcRect, moved: false,
            acLine, acOrigLeft: acLine ? parseFloat(acLine.style.left) : 0
          };
          // ゴースト（元の位置表示）
          const ghost = document.createElement('div');
          ghost.className = 'drag-ghost';
          ghost.style.left = resEl.style.left;
          ghost.style.width = resEl.style.width;
          ghost.style.top = '2px';
          ghost.style.bottom = '2px';
          ghost.id = 'drag-ghost';
          tc.appendChild(ghost);
          tc.setPointerCapture(e.pointerId);
        }, 400);
      } else {
        // 休憩・練習: 従来の長押し編集
        longPressTimer = setTimeout(() => {
          longPressed = true;
          openViewModal(res);
        }, 500);
      }
    });

    tc.addEventListener('pointermove', function(e) {
      if (!dragState) return;
      e.preventDefault();
      dragState.moved = true;

      // 横移動（時間変更）
      const dx = e.clientX - dragState.startX;
      const dPct = (dx / dragState.tcRect.width) * 100;
      let newLeft = dragState.origLeft + dPct;
      // 5分スナップ
      const snapPct = (5 / tMin) * 100;
      newLeft = Math.round(newLeft / snapPct) * snapPct;
      newLeft = Math.max(0, Math.min(newLeft, 100 - dragState.origWidth));
      dragState.el.style.left = newLeft + '%';
      // アフターケア線も追従
      if (dragState.acLine) {
        dragState.acLine.style.left = (dragState.acOrigLeft + (newLeft - dragState.origLeft)) + '%';
      }

      // 縦移動（部屋変更）
      const allTcs = wrapper.querySelectorAll('.time-cells');
      allTcs.forEach(otherTc => {
        const otherRect = otherTc.getBoundingClientRect();
        if (e.clientY >= otherRect.top && e.clientY <= otherRect.bottom && otherTc.dataset.room !== dragState.roomId) {
          // 別の部屋に移動
          const ghost = document.getElementById('drag-ghost');
          if (ghost) ghost.remove();
          // 元の部屋から削除して新しい部屋に追加
          if (dragState.el.parentElement !== otherTc) {
            dragState.el.remove();
            otherTc.appendChild(dragState.el);
            // ゴーストを新しい部屋ではなく元の部屋に残す（元位置の目印）
          }
          dragState.roomId = otherTc.dataset.room;
          dragState.tcRect = otherRect;
        }
      });
    });

    tc.addEventListener('pointerup', function(e) {
      clearTimeout(longPressTimer);
      if (dragState && dragState.moved) {
        const ds = dragState;
        const el = ds.el;
        el.classList.remove('dragging');
        el.style.transition = '';

        // ゴースト削除
        const ghost = document.getElementById('drag-ghost');
        if (ghost) ghost.remove();

        // 新しい時間を計算
        const newLeftPct = parseFloat(el.style.left);
        const newStartMin = Math.round(newLeftPct / 100 * tMin);
        const [osh, osm] = ds.res.start.split(':').map(Number);
        const [oeh, oem] = ds.res.end.split(':').map(Number);
        const duration = (oeh * 60 + oem) - (osh * 60 + osm);
        const newStartH = bh.start + Math.floor(newStartMin / 60);
        const newStartM = newStartMin % 60;
        const newEndMin = newStartMin + duration;
        const newEndH = bh.start + Math.floor(newEndMin / 60);
        const newEndM = newEndMin % 60;
        const newStart = `${newStartH}:${String(newStartM).padStart(2,'0')}`;
        const newEnd = `${newEndH}:${String(newEndM).padStart(2,'0')}`;
        const newRoomId = ds.roomId;
        const roomChanged = newRoomId !== ds.origRoomId;
        const timeChanged = newStart !== ds.res.start;

        if (!timeChanged && !roomChanged) {
          // 移動なし → 元に戻す
          dragState = null;
          renderGrid();
          return;
        }

        // 確認モーダル表示
        const oldRoom = rooms.find(r => r.id === ds.origRoomId);
        const newRoom = rooms.find(r => r.id === newRoomId);
        let detail = '';
        if (timeChanged) detail += `<div>時間: <strong>${ds.res.start}〜${ds.res.end}</strong> → <strong>${newStart}〜${newEnd}</strong></div>`;
        if (roomChanged) detail += `<div>部屋: <strong>${oldRoom?.name||'?'}</strong> → <strong>${newRoom?.name||'?'}</strong></div>`;

        document.getElementById('dragConfirmName').textContent = ds.res.name;
        document.getElementById('dragConfirmDetail').innerHTML = detail;
        document.getElementById('dragConfirmModal').classList.add('active');

        // AC時間計算
        let newAC = ds.res.aftercareEnd;
        if (ds.res.aftercareEnd) {
          const acDur = (() => {
            const [ah, am] = ds.res.aftercareEnd.split(':').map(Number);
            return (ah * 60 + am) - (oeh * 60 + oem);
          })();
          const acMin = newEndMin + (bh.start * 60) + acDur;
          newAC = `${Math.floor(acMin / 60)}:${String(acMin % 60).padStart(2,'0')}`;
        }

        pendingDragAction = { ds, newStart, newEnd, newRoomId, newAC };
        dragState = null;
      } else if (dragState) {
        // ドラッグモード入ったが動かなかった → 詳細モーダル表示
        const ghost = document.getElementById('drag-ghost');
        if (ghost) ghost.remove();
        dragState.el.classList.remove('dragging');
        dragState.el.style.transition = '';
        const res = dragState.res;
        dragState = null;
        renderGrid();
        openViewModal(res);
      } else {
        dragState = null;
      }
    });
    tc.addEventListener('pointercancel', () => {
      clearTimeout(longPressTimer);
      if (dragState) {
        const ghost = document.getElementById('drag-ghost');
        if (ghost) ghost.remove();
        dragState.el.classList.remove('dragging');
        dragState = null;
        renderGrid();
      }
    });

    tc.onclick = function(e) {
      if (longPressed) { longPressed = false; return; }
      const resEl = e.target.closest('[data-id]');
      if (resEl) {
        const res = dayReservations.find(r => r.id === resEl.dataset.id);
        if (res && res.type !== 'break' && res.type !== 'practice') return;
      }
      const rect = tc.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      const clickMin = Math.round(pct * totalH * 60 / 5) * 5;
      const h = bh.start + Math.floor(clickMin / 60);
      const m = clickMin % 60;
      openAddModal(tc.dataset.room, h, m, bh);
    };
  });
}

// ── ドラッグ確認 ──
async function dragConfirmResult(ok) {
  document.getElementById('dragConfirmModal').classList.remove('active');
  if (ok && pendingDragAction) {
    const { ds, newStart, newEnd, newRoomId, newAC } = pendingDragAction;
    // IDで現在の配列から探して更新（sync後に参照が切れるため）
    const target = dayReservations.find(r => r.id === ds.res.id);
    // デバッグ（問題解決後に削除）
    alert(`v52確認\nid=${ds.res.id}\ntarget=${target ? '見つかった' : 'なし'}\n${ds.res.start}→${newStart}`);
    if (target) {
      target.start = newStart;
      target.end = newEnd;
      target.roomId = newRoomId;
      if (newAC) target.aftercareEnd = newAC;
    }
    const allRes = lsLoad('reservations', {});
    allRes[dateKey(currentDate)] = dayReservations;
    lsSave('reservations', allRes);
    renderGrid();
    // PATCH（部分更新）— sbUpsertだとNOT NULLカラム欠損で失敗する
    savingInProgress = true;
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/yoyaku_reservations?id=eq.${ds.res.id}`, {
        method: 'PATCH',
        headers: { ...getSbHeadersFull(), 'Prefer': 'return=minimal' },
        body: JSON.stringify({ start_time: newStart, end_time: newEnd, room_id: newRoomId, aftercare_end: newAC || null, updated_at: new Date().toISOString() })
      });
    } catch(e) { console.error('Drag PATCH error:', e); }
    savingInProgress = false;
  } else {
    renderGrid();
  }
  pendingDragAction = null;
}

// ── Modals ──
let editingRes = null;
let endTimeManuallySet = false;
let savingInProgress = false; // 保存中フラグ（sync上書き防止）
let currentType = 'treatment';

function setType(type) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
  const isTreatment = type === 'treatment';
  const isShopping = type === 'shopping';
  const isPractice = type === 'practice';
  const isBlock = type === 'block';
  document.getElementById('treatmentFields').style.display = (isTreatment || isShopping) ? '' : 'none';
  document.getElementById('practiceFields').style.display = isPractice ? '' : 'none';
  document.getElementById('blockFields').style.display = isBlock ? '' : 'none';
  document.getElementById('singleStaffField').style.display = (isPractice || isBlock) ? 'none' : '';
  document.getElementById('aftercareFields').style.display = isTreatment ? '' : 'none';
  document.getElementById('checkinField').style.display = isTreatment ? '' : 'none';
  document.getElementById('detailToggle').style.display = isTreatment ? '' : 'none';
  // 部屋セレクトは通常非表示（ブロックは独自UIで選ぶ）
  document.getElementById('resRoom').closest('.form-group').style.display = isBlock ? 'none' : '';
  // ラベル変更
  const labelMap = { treatment: ['施術開始','施術終了'], break: ['開始','終了'], task: ['開始','終了'], practice: ['開始','終了'], shopping: ['開始','終了'], block: ['ブロック開始','ブロック終了'] };
  document.getElementById('labelStart').textContent = labelMap[type][0];
  document.getElementById('labelEnd').textContent = labelMap[type][1];
  if (!isTreatment && !isShopping) {
    document.getElementById('resName').placeholder = 'メモ';
  } else {
    document.getElementById('resName').placeholder = '山田 花子 様';

  if (isBlock) populateBlockFields();
}

const PRACTICE_MENUS = ['フェイシャル', 'インディバ', 'コルギ', 'クロージング'];
let selectedPracticeMenu = '';

function populatePracticeFields() {
  // メニュー選択
  const menuEl = document.getElementById('practiceMenuSelector');
  menuEl.innerHTML = PRACTICE_MENUS.map(m =>
    `<button type="button" class="practice-menu-btn${selectedPracticeMenu === m ? ' active' : ''}" data-menu="${m}">${m}</button>`
  ).join('');
  menuEl.querySelectorAll('.practice-menu-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedPracticeMenu = selectedPracticeMenu === btn.dataset.menu ? '' : btn.dataset.menu;
      if (selectedPracticeMenu) document.getElementById('practiceMenuCustom').value = '';
      populatePracticeFields();
    });
  });
  document.getElementById('practiceMenuCustom').addEventListener('input', function() {
    if (this.value) { selectedPracticeMenu = ''; menuEl.querySelectorAll('.practice-menu-btn').forEach(b => b.classList.remove('active')); }
  });
  // スタッフチェックボックス
  const checksEl = document.getElementById('practiceStaffChecks');
  const prevChecked = Array.from(checksEl.querySelectorAll('input:checked')).map(i => i.value);
  checksEl.innerHTML = staff.map(s => {
    const checked = prevChecked.includes(s.id) ? 'checked' : '';
    return `<label class="practice-staff-check${checked ? ' checked' : ''}">
      <input type="checkbox" value="${s.id}" ${checked}>
      <span class="staff-color-dot" style="background:${s.color};width:12px;height:12px;border-radius:50%;display:inline-block"></span>
      ${shortName(s)}
    </label>`;
  }).join('');
  checksEl.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('change', () => {
      inp.closest('.practice-staff-check').classList.toggle('checked', inp.checked);
    });
  });
}

function populateBlockFields() {

function openViewModal(res) {
  const s = res.staffId ? staff.find(st => st.id === res.staffId) : null;
  const type = res.type || 'treatment';
  const typeLabels = { treatment: '施術', break: '休憩', task: '業務', practice: '練習', shopping: '買い物', block: '🚫 ブロック' };
  const room = rooms.find(r => r.id === res.roomId);
  const acStaff = res.aftercareStaffId ? staff.find(st => st.id === res.aftercareStaffId) : s;

  let html = `<div class="modal-header" style="border-left-color:${s ? s.color : '#9CA3AF'}">
    <span class="modal-title">${type === 'practice' ? '練習' : type === 'block' ? '🚫 ブロック' : res.name}</span>
    <button class="modal-close" onclick="closeModal('viewModal')">&times;</button>
  </div><div class="modal-body">`;

  html += `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px">`;
