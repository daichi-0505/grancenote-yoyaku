  // 誕生月 + 施術時間
  if (res.customerId) {
    const ci = dayCustomerInfoMap[res.customerId];
    if (ci && ci.birthday && new Date(ci.birthday).getMonth() + 1 === new Date().getMonth() + 1) {
      html += `<span style="font-size:12px;font-weight:800;color:#C2185B;background:#FCE4EC;padding:3px 8px;border-radius:6px">誕生月🎉</span>`;
    }
    if (ci && ci.default_duration) {
      html += `<span style="font-size:12px;font-weight:800;color:var(--accent);background:var(--accent-glow);padding:3px 8px;border-radius:6px">施術${ci.default_duration}分</span>`;
    }
  }
  // カルテステータス
  if (type === 'treatment' && res.customerId) {
    const ks = dayKarteStatusMap[res.customerId];
    if (ks === 'complete') html += `<span style="font-size:12px;font-weight:800;color:#27AE60;background:rgba(39,174,96,0.1);padding:3px 8px;border-radius:6px">カルテ記入済</span>`;
    else if (ks === 'draft') html += `<span style="font-size:12px;font-weight:800;color:#E67E22;background:rgba(230,126,34,0.1);padding:3px 8px;border-radius:6px">カルテ記入途中</span>`;
    else html += `<span style="font-size:12px;font-weight:800;color:#C0392B;background:rgba(192,57,43,0.1);padding:3px 8px;border-radius:6px">カルテ未記入</span>`;
  }
  html += `</div>`;

  if (res.menu) html += `<div style="font-size:14px;font-weight:700;padding:2px 0">${res.menu}</div>`;
  html += `<div style="font-size:13px;color:var(--text-secondary);padding:2px 0">`;
  html += `${res.start} 〜 ${res.end}`;
  if (room) html += ` / ${room.name}`;
  html += `</div>`;
  if (type === 'block') {
    if (res.blockRoomIds && res.blockRoomIds.length > 0) {
      const roomNames = res.blockRoomIds.map(rid => { const rm = rooms.find(r => r.id === rid); return rm ? rm.name : '?'; });
      html += `<div style="font-size:13px;padding:2px 0">対象部屋: <strong>${roomNames.join('、')}</strong></div>`;
    }
    if (res.blockStaffIds && res.blockStaffIds.length > 0) {
      const staffNames = res.blockStaffIds.map(sid => { const ps = staff.find(st => st.id === sid); return ps ? ps.name : '?'; });
      html += `<div style="font-size:13px;padding:2px 0">関連スタッフ: <strong>${staffNames.join('、')}</strong></div>`;
    }
  } else if (type === 'practice' && res.practiceStaffIds && res.practiceStaffIds.length > 0) {
    const names = res.practiceStaffIds.map(sid => { const ps = staff.find(st => st.id === sid); return ps ? ps.name : '?'; });
    html += `<div style="font-size:13px;padding:2px 0">参加: <strong>${names.join('、')}</strong></div>`;
  } else {
    html += `<div style="font-size:13px;padding:2px 0">担当: <strong>${s ? s.name : '⚠ 未定'}</strong></div>`;
  }

  if (res.aftercareEnd) {
    html += `<div style="font-size:13px;padding:2px 0;color:var(--text-secondary)">アフターケア: 〜${res.aftercareEnd}（${acStaff ? acStaff.name : '—'}）</div>`;
  }
  if (res.memo) html += `<div style="font-size:13px;padding:4px 0;color:var(--text-secondary)">メモ: ${res.memo}</div>`;
  if (res.subAssignments && res.subAssignments.length > 0) {
    html += `<div style="font-size:12px;padding:4px 0;color:var(--text-muted)">分担: `;
    html += res.subAssignments.map(sa => {
      const ss = staff.find(st => st.id === sa.staffId);
      return `${ss ? ss.name : '?'} ${sa.start}〜${sa.end}`;
    }).join(' / ');
    html += `</div>`;
  }

  html += `</div>`;
  // カルテリンク（customer_idがあれば表示）
  if (res.customerId) {
    html += `<div style="padding:8px 16px"><a href="${KARTE_APP_URL}?customer_id=${res.customerId}" target="_blank" style="display:block;text-align:center;background:var(--accent);color:#fff;font-size:14px;font-weight:700;text-decoration:none;padding:10px 16px;border-radius:8px;">&#128203; カルテを見る</a></div>`;
  }

  html += `<div class="modal-footer">`;
  if (!res.checkedIn) {
    html += `<button class="btn btn-primary" style="background:var(--success)" onclick="quickCheckIn('${res.id}')">✓ 来店チェック</button>`;
  }
  html += `<button class="btn btn-cancel" onclick="closeModal('viewModal');openEditModal(dayReservations.find(r=>r.id==='${res.id}'))">編集</button>`;
  html += `<button class="btn btn-danger" onclick="closeModal('viewModal');editingRes=dayReservations.find(r=>r.id==='${res.id}');deleteReservation()">削除</button>`;
  html += `</div>`;

  let modal = document.getElementById('viewModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'viewModal';
    modal.innerHTML = '<div class="modal"></div>';
    modal.addEventListener('click', e => { if (e.target === modal) closeModal('viewModal'); });
    document.body.appendChild(modal);
  }
  modal.querySelector('.modal').innerHTML = html;
  modal.classList.add('active');
}

async function quickCheckIn(resId) {
  const res = dayReservations.find(r => r.id === resId);
  if (!res) return;
  res.checkedIn = true;
  // localStorage
  const allRes = lsLoad('reservations', {});
  allRes[dateKey(currentDate)] = dayReservations;
  lsSave('reservations', allRes);
  closeModal('viewModal');
  renderGrid();
  // Supabase — PATCHで部分更新
  await ensureAuth();
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/yoyaku_reservations?id=eq.${resId}`, {
      method: 'PATCH',
      headers: { ...getSbHeadersFull(), 'Prefer': 'return=minimal' },
      body: JSON.stringify({ checked_in: true, updated_at: new Date().toISOString() })
    });
  } catch(e) { console.error('CheckIn PATCH error:', e); }
}

// ── 空き枠検索 ──
let searchSelectedStaffs = [];
let searchSelectedDows = [];
let searchSelectedRooms = [];
let searchSelectedDuration = 90;

function openSearchModal() {
  // 期間デフォルト設定
  const fromEl = document.getElementById('searchDateFrom');
  const toEl = document.getElementById('searchDateTo');
  if (!fromEl.value) {
    fromEl.value = dateKey(new Date());
    const def = new Date(); def.setDate(def.getDate() + 30);
    toEl.value = dateKey(def);
  }

  // スタッフボタン（複数選択）
  const staffEl = document.getElementById('searchStaffBtns');
  staffEl.innerHTML = staff.map(s => {
    const sel = searchSelectedStaffs.includes(s.id);
    return `<button class="search-filter-btn" data-id="${s.id}" style="border-color:${sel ? s.color : ''};color:${sel ? s.color : ''};background:${sel ? s.color + '15' : ''}">${shortName(s)}</button>`;
  }).join('');
  staffEl.querySelectorAll('.search-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      if (searchSelectedStaffs.includes(id)) searchSelectedStaffs = searchSelectedStaffs.filter(x => x !== id);
      else searchSelectedStaffs.push(id);
      openSearchModal();
    });
  });

  // 曜日ボタン
  const dowNames = ['日','月','火','水','木','金','土'];
  const dowEl = document.getElementById('searchDowBtns');
  dowEl.innerHTML = [2,3,4,5,6].map(d =>
    `<button class="search-filter-btn${searchSelectedDows.includes(d) ? ' active' : ''}" data-dow="${d}">${dowNames[d]}</button>`
  ).join('');
  dowEl.querySelectorAll('.search-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const d = parseInt(btn.dataset.dow);
      if (searchSelectedDows.includes(d)) searchSelectedDows = searchSelectedDows.filter(x => x !== d);
      else searchSelectedDows.push(d);
      openSearchModal();
    });
  });

  // 部屋ボタン
  const roomEl = document.getElementById('searchRoomBtns');
  roomEl.innerHTML = rooms.map(r =>
    `<button class="search-filter-btn${searchSelectedRooms.includes(r.id) ? ' active' : ''}" data-rid="${r.id}">${r.name}</button>`
  ).join('');
  roomEl.querySelectorAll('.search-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.rid;
      if (searchSelectedRooms.includes(id)) searchSelectedRooms = searchSelectedRooms.filter(x => x !== id);
      else searchSelectedRooms.push(id);
      openSearchModal();
    });
  });

  // 施術時間ボタン
  const presets = [60,90,120,150,180];
  const isCustom = !presets.includes(searchSelectedDuration);
  const durEl = document.getElementById('searchDurationBtns');
  let durHtml = presets.map(d =>
    `<button class="search-filter-btn${searchSelectedDuration === d ? ' active' : ''}" data-dur="${d}">${d}分</button>`
  ).join('');
  durHtml += `<div style="display:flex;align-items:center;gap:4px;margin-top:4px;width:100%">
    <input type="number" id="searchDurationCustom" min="5" max="480" step="5" value="${isCustom ? searchSelectedDuration : ''}" placeholder="任意（分）" style="width:100px;padding:6px;border:2px solid ${isCustom ? 'var(--accent)' : 'var(--border-default)'};border-radius:8px;font-size:13px;font-weight:700">
    <button class="search-filter-btn${isCustom ? ' active' : ''}" id="searchDurationCustomBtn">設定</button>
  </div>`;
  durEl.innerHTML = durHtml;
  durEl.querySelectorAll('.search-filter-btn[data-dur]').forEach(btn => {
    btn.addEventListener('click', () => {
      searchSelectedDuration = parseInt(btn.dataset.dur);
      document.getElementById('searchDurationCustom').value = '';
      openSearchModal();
    });
  });
  document.getElementById('searchDurationCustomBtn').addEventListener('click', () => {
    const v = parseInt(document.getElementById('searchDurationCustom').value);
    if (v && v >= 5) { searchSelectedDuration = v; openSearchModal(); }
    else alert('5分以上で入力してください');
  });

  document.getElementById('searchModal').classList.add('active');
}

async function executeSearch() {
  if (searchSelectedStaffs.length === 0) { alert('スタッフを選択してください'); return; }
  if (searchSelectedDows.length === 0) { alert('希望曜日を選択してください'); return; }

  const resultsEl = document.getElementById('searchResults');
  resultsEl.innerHTML = '<div class="search-loading">検索中...</div>';

  const duration = searchSelectedDuration;
  const startStr = document.getElementById('searchDateFrom').value;
  const endStr = document.getElementById('searchDateTo').value;
  if (!startStr || !endStr) { alert('検索期間を指定してください'); return; }

  const startDate = new Date(startStr + 'T00:00:00');
  const endDate = new Date(endStr + 'T00:00:00');

  // Supabaseから対象期間の予約・シフト・ブロックを取得
  const staffFilter = searchSelectedStaffs.map(id => `staff_id.eq.${id}`).join(',');
  const fetches = [
    sbGet('yoyaku_reservations', `date=gte.${startStr}&date=lte.${endStr}&or=(${staffFilter})&select=date,start_time,end_time,type,staff_id`),
    sbGet('yoyaku_shifts', `date=gte.${startStr}&date=lte.${endStr}&or=(${staffFilter})`),
    sbGet('yoyaku_reservations', `date=gte.${startStr}&date=lte.${endStr}&type=eq.block&select=date,start_time,end_time,block_staff_ids,block_room_ids`),
  ];
  // 部屋指定がある場合、全予約（部屋の空きチェック用）も取得
  if (searchSelectedRooms.length > 0) {
    const roomFilter = searchSelectedRooms.map(id => `room_id.eq.${id}`).join(',');
    fetches.push(sbGet('yoyaku_reservations', `date=gte.${startStr}&date=lte.${endStr}&or=(${roomFilter})&type=neq.break&type=neq.task&type=neq.practice&select=date,start_time,end_time,room_id,type,block_room_ids`));
  }
  const [resData, shiftData, blockData, roomResData] = await Promise.all(fetches);

  const reservations = resData || [];
  const shifts = shiftData || [];
  const allRoomRes = roomResData || [];
  const blocks = (blockData || []).map(b => ({
    ...b,
    block_staff_ids: b.block_staff_ids ? (typeof b.block_staff_ids === 'string' ? JSON.parse(b.block_staff_ids) : b.block_staff_ids) : [],
    block_room_ids: b.block_room_ids ? (typeof b.block_room_ids === 'string' ? JSON.parse(b.block_room_ids) : b.block_room_ids) : []
  }));

  const results = [];
  const d = new Date(startDate);

  while (d <= endDate) {
    const dow = d.getDay();
    if (!searchSelectedDows.includes(dow)) { d.setDate(d.getDate() + 1); continue; }

    const bh = getBH(d);
    if (!bh) { d.setDate(d.getDate() + 1); continue; }

    const dk = dateKey(d);
    const dayStaffSlots = []; // { staffName, staffColor, slots[] }

    for (const sid of searchSelectedStaffs) {
      const s = staff.find(st => st.id === sid);
      if (!s) continue;

      // シフト確認
      const shiftRec = shifts.find(sh => sh.date === dk && sh.staff_id === sid);
      let staffStart, staffEnd;
      if (shiftRec) {
        if (shiftRec.is_off) continue;
        staffStart = parseFloat(shiftRec.start_time);
        staffEnd = parseFloat(shiftRec.end_time);
      } else {
        const fallback = getStaffShift(sid, d);
        if (!fallback) continue;
        staffStart = fallback.start;
        staffEnd = fallback.end;
      }

      // その日のそのスタッフの予約（施術系のみ）
      const dayRes = reservations
        .filter(r => r.date === dk && r.staff_id === sid && r.type !== 'break' && r.type !== 'task' && r.type !== 'practice')
        .map(r => {
          const [sh, sm] = r.start_time.split(':').map(Number);
          const [eh, em] = r.end_time.split(':').map(Number);
          return { start: sh * 60 + sm, end: eh * 60 + em };
        });
      // ブロック時間帯も追加（このスタッフが紐づいている場合）
      blocks.filter(b => b.date === dk && b.block_staff_ids.includes(sid)).forEach(b => {
        const [sh, sm] = b.start_time.split(':').map(Number);
        const [eh, em] = b.end_time.split(':').map(Number);
        dayRes.push({ start: sh * 60 + sm, end: eh * 60 + em });
      });
      dayRes.sort((a, b) => a.start - b.start);

      // 空き枠算出
      const staffStartMin = staffStart * 60;
      const staffEndMin = staffEnd * 60;
      const slots = [];
      let cursor = staffStartMin;

      dayRes.forEach(r => {
        if (cursor + duration <= r.start) {
          for (let t = cursor; t + duration <= r.start; t += 5) {
            slots.push(t);
          }
        }
        cursor = Math.max(cursor, r.end);
      });
      for (let t = cursor; t + duration <= staffEndMin; t += 5) {
        slots.push(t);
      }

      // 部屋指定がある場合、部屋が空いてるスロットだけ残す
      if (searchSelectedRooms.length > 0 && slots.length > 0) {
        const roomOccupied = []; // 選んだ部屋ごとの予約時間帯
        searchSelectedRooms.forEach(rid => {
          const occ = allRoomRes
            .filter(r => r.date === dk && r.room_id === rid)
            .map(r => {
              const [rsh, rsm] = r.start_time.split(':').map(Number);
              const [reh, rem] = r.end_time.split(':').map(Number);
              return { start: rsh * 60 + rsm, end: reh * 60 + rem };
            });
          // ブロックも部屋占有に追加
          blocks.filter(b => b.date === dk && b.block_room_ids.includes(rid)).forEach(b => {
            const [bsh, bsm] = b.start_time.split(':').map(Number);
            const [beh, bem] = b.end_time.split(':').map(Number);
            occ.push({ start: bsh * 60 + bsm, end: beh * 60 + bem });
          });
          roomOccupied.push({ rid, occ });
        });
        // スロットごとに、いずれかの部屋が空いてるか確認
        const filtered = slots.filter(t => {
          return roomOccupied.some(ro => {
            return !ro.occ.some(o => t < o.end && t + duration > o.start);
          });
        });
        slots.length = 0;
        filtered.forEach(t => slots.push(t));
      }

      if (slots.length > 0) {
        // 連続する5分刻みをまとめて範囲表示
        const displaySlots = [];
        let rangeStart = slots[0];
        let prev = slots[0];
        for (let i = 1; i <= slots.length; i++) {
          if (i < slots.length && slots[i] === prev + 5) {
            prev = slots[i];
          } else {
            if (rangeStart === prev) {
              displaySlots.push(formatMin(rangeStart) + '〜');
            } else {
              displaySlots.push(formatMin(rangeStart) + '〜' + formatMin(prev) + '開始');
            }
            if (i < slots.length) { rangeStart = slots[i]; prev = slots[i]; }
          }
        }
        dayStaffSlots.push({ name: shortName(s), color: s.color, slots: displaySlots });
      }
    }

    if (dayStaffSlots.length > 0) {
      const dowLabel = ['日','月','火','水','木','金','土'][dow];
      results.push({
        date: `${d.getMonth()+1}/${d.getDate()}(${dowLabel})`,
        staffSlots: dayStaffSlots,
        dk: dk
      });
    }

    d.setDate(d.getDate() + 1);
  }

  if (results.length === 0) {
    resultsEl.innerHTML = '<div class="search-loading">条件に合う空きが見つかりませんでした</div>';
    return;
  }

  // 全スタッフの空き枠をマージ（日別にまとめ、重複除外）
  const dayMap = []; // [{ date, dk, slots[] }]
  results.forEach(r => {
    const allSlots = new Set();
    r.staffSlots.forEach(ss => ss.slots.forEach(slot => allSlots.add(slot)));
    const sorted = Array.from(allSlots).sort();
    if (sorted.length > 0) {
      dayMap.push({ date: r.date, dk: r.dk, slots: sorted });
    }
  });

  // 時刻を「○時」「○時○分」形式に変換
  function formatTimeJP(slot) {
    // "9:00〜" → "9時", "10:30〜16:30開始" → "10時30分〜16時30分開始"
    return slot.replace(/(\d+):(\d+)/g, (_, h, m) => {
      return m === '00' ? `${parseInt(h)}時` : `${parseInt(h)}時${parseInt(m)}分`;
    });
  }

  // コピー用テキスト生成（同じ日のスロットは/で繋ぐ）
  const copyLines = dayMap.map(d => {
    const slotsJP = d.slots.map(s => formatTimeJP(s));
    return `${d.date} ${slotsJP.join('/')}`;
  });
  const copyText = `日程を確認いたしましたところ、下記のお日にちでご案内が可能でございます🙌\n\n【ご案内可能日時】\n\n${copyLines.join('  \n')}\n\n上記の日時で、ご都合のよろしいお時間はございますでしょうか？\n\nなお、行き違いで他のお客様のご予約が入る場合もございますため、その際は改めてご都合のよい日時をお伺いできますと幸いです☺️\n\nどうぞよろしくお願いいたします。`;

  // 表示
  let html = '';
  html += `<button class="btn btn-primary" id="copySearchResult" style="width:100%;margin-bottom:10px;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> コピー</button>`;
  html += `<div class="search-results">`;
  dayMap.forEach(d => {
    const slotsJP = d.slots.map(s => formatTimeJP(s));
    html += `<div class="search-result-day" data-dk="${d.dk}">
      <span class="date-label">${d.date}</span>
      <span class="slots">${slotsJP.join(' / ')}</span>
    </div>`;
  });
  html += `</div>`;

  resultsEl.innerHTML = html;

  // コピーボタン + 通知
  document.getElementById('copySearchResult').addEventListener('click', () => {
    navigator.clipboard.writeText(copyText).then(() => {
      const btn = document.getElementById('copySearchResult');
      btn.innerHTML = '✓ コピーしました';
      btn.style.background = 'var(--success)';
      setTimeout(() => {
        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> コピー`;
        btn.style.background = '';
      }, 2000);
      // 通知
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('コピー完了', { body: 'ご案内可能日時をクリップボードにコピーしました' });
      }
    });
  });

  // タップで予約表に飛ぶ
  resultsEl.querySelectorAll('.search-result-day').forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('click', () => {
      const d = new Date(el.dataset.dk + 'T00:00:00');
      goToDate(d);
      closeModal('searchModal');
      document.querySelectorAll('.header-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-page="schedule"]').classList.add('active');
      document.querySelectorAll('.page-content').forEach(p => p.style.display = 'none');
      document.getElementById('page-schedule').style.display = 'flex';
      currentPage = 'schedule';
    });
  });
}

function formatMin(m) {
  return `${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`;
}

function openEditModal(res) {
  const bh = getBH(currentDate); if (!bh) return;
  editingRes = res;
  const type = res.type || 'treatment';
  setType(type);
  document.getElementById('modalTitle').textContent = '編集';
  document.getElementById('resName').value = res.name;
  // カルテ連携: customer_idが保存されていればカルテリンクを表示
  document.getElementById('resCustomerId').value = res.customerId || '';
  if (res.customerId) {
    document.getElementById('karteLinkUrl').href = KARTE_APP_URL + '?customer_id=' + res.customerId;
    document.getElementById('karteLink').style.display = 'block';
  } else {
    document.getElementById('karteLink').style.display = 'none';
  }
  document.getElementById('resMenu').value = res.menu || '';
  document.getElementById('resMemo').value = res.memo || '';
  document.getElementById('resCheckedIn').checked = !!res.checkedIn;
  endTimeManuallySet = true; // 編集時は既存の時間を優先
  populateTimeSelects(bh); populateStaffSelect(); populateRoomSelect(res.roomId);
  document.getElementById('resStart').value = res.start;
  document.getElementById('resEnd').value = res.end;
  document.getElementById('resEnd').onchange = () => { endTimeManuallySet = true; };
  document.getElementById('resStaff').value = res.staffId || '';
  document.getElementById('resAftercareEnd').value = res.aftercareEnd || '';
  document.getElementById('resAftercareStaff').value = res.aftercareStaffId || '';
  // ブロックの場合、部屋とスタッフを復元
  if (type === 'block') {
    populateBlockFields();
    if (res.blockRoomIds) {
      res.blockRoomIds.forEach(rid => {
        const cb = document.querySelector(`#blockRoomChecks input[value="${rid}"]`);
        if (cb) { cb.checked = true; cb.closest('.practice-staff-check').classList.add('checked'); }
      });
    }
    if (res.blockStaffIds) {
      res.blockStaffIds.forEach(sid => {
        const cb = document.querySelector(`#blockStaffChecks input[value="${sid}"]`);
        if (cb) { cb.checked = true; cb.closest('.practice-staff-check').classList.add('checked'); }
      });
    }
  }
  // 練習の場合、メニューとスタッフを復元
  if (type === 'practice') {
    selectedPracticeMenu = '';
    document.getElementById('practiceMenuCustom').value = '';
    if (res.menu && PRACTICE_MENUS.includes(res.menu)) {
      selectedPracticeMenu = res.menu;
    } else if (res.menu) {
      document.getElementById('practiceMenuCustom').value = res.menu;
    }
    populatePracticeFields();
    if (res.practiceStaffIds) {
      res.practiceStaffIds.forEach(sid => {
        const cb = document.querySelector(`#practiceStaffChecks input[value="${sid}"]`);
        if (cb) { cb.checked = true; cb.closest('.practice-staff-check').classList.add('checked'); }
      });
    }
  }
  document.getElementById('detailToggle').classList.remove('open');
  document.getElementById('detailSection').classList.remove('open');
  populateSubAssignments(res.subAssignments || []);
  if (res.subAssignments && res.subAssignments.length > 0) {
    document.getElementById('detailToggle').classList.add('open');
    document.getElementById('detailSection').classList.add('open');
  }
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-danger" onclick="deleteReservation()">削除</button>
    <button class="btn btn-cancel" onclick="closeModal('reservationModal')">キャンセル</button>
    <button class="btn btn-primary" onclick="saveReservation()">保存</button>`;
  document.getElementById('reservationModal').classList.add('active');
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

async function saveReservation() {
  const name = document.getElementById('resName').value.trim();
  const isTreatment = currentType === 'treatment' || currentType === 'shopping';
  const isPractice = currentType === 'practice';
  const isBlock = currentType === 'block';
  if (isTreatment && !name) { alert('お客様名を入力してください'); return; }
  if (isPractice) {
    const checkedStaff = Array.from(document.querySelectorAll('#practiceStaffChecks input:checked'));
    if (checkedStaff.length === 0) { alert('参加スタッフを選択してください'); return; }
  }
  if (isBlock) {
    const checkedRooms = Array.from(document.querySelectorAll('#blockRoomChecks input:checked'));
    if (checkedRooms.length === 0) { alert('ブロック対象部屋を選択してください'); return; }
  }
  let menu = '';
  if (isTreatment) {
    menu = document.getElementById('resMenu').value.trim();
  } else if (isPractice) {
    menu = selectedPracticeMenu || document.getElementById('practiceMenuCustom').value.trim();
  }
  const practiceStaffIds = isPractice
    ? Array.from(document.querySelectorAll('#practiceStaffChecks input:checked')).map(i => i.value)
    : null;
  const blockRoomIds = isBlock
    ? Array.from(document.querySelectorAll('#blockRoomChecks input:checked')).map(i => i.value)
    : null;
  const blockStaffIds = isBlock
    ? Array.from(document.querySelectorAll('#blockStaffChecks input:checked')).map(i => i.value)
    : null;
  const data = {
    id: editingRes ? editingRes.id : 'r' + Date.now(),
    date: dateKey(currentDate),
    name: name || currentType,
    menu: menu,
    staffId: isPractice ? (practiceStaffIds[0] || '') : isBlock ? '' : (document.getElementById('resStaff').value || ''),
    start: document.getElementById('resStart').value,
    end: document.getElementById('resEnd').value,
    roomId: isBlock ? (blockRoomIds[0] || '') : document.getElementById('resRoom').value,
    memo: document.getElementById('resMemo').value.trim(),
    type: currentType,
    checkedIn: document.getElementById('resCheckedIn').checked,
    aftercareEnd: document.getElementById('resAftercareEnd').value || null,
    aftercareStaffId: document.getElementById('resAftercareStaff').value || null,
    subAssignments: getSubAssignments(),
    practiceStaffIds: practiceStaffIds,
    blockRoomIds: blockRoomIds,
    blockStaffIds: blockStaffIds,
    customerId: document.getElementById('resCustomerId').value || null,
  };

  // ブロックチェック（施術・買い物をブロック時間帯に入れようとしたら警告）
  if (isTreatment && !isBlock) {
    const [dsh, dsm] = data.start.split(':').map(Number);
    const [deh, dem] = data.end.split(':').map(Number);
    const dStartMin = dsh * 60 + dsm;
    const dEndMin = deh * 60 + dem;
    const blocked = dayReservations.find(r => {
      if (r.type !== 'block') return false;
      if (editingRes && r.id === editingRes.id) return false;
      if (!r.blockRoomIds || !r.blockRoomIds.includes(data.roomId)) return false;
      const [bsh, bsm] = r.start.split(':').map(Number);
      const [beh, bem] = r.end.split(':').map(Number);
      return dStartMin < beh * 60 + bem && dEndMin > bsh * 60 + bsm;
    });
    if (blocked) {
      if (!confirm(`この時間帯はブロックされています（${blocked.start}〜${blocked.end}）。それでも登録しますか？`)) return;
    }
  }

  if (editingRes) {
    dayReservations = dayReservations.map(r => r.id === editingRes.id ? data : r);
  } else {
    dayReservations.push(data);
  }

  // localStorageにキャッシュ保存（即表示用）
  const allRes = lsLoad('reservations', {});
  allRes[dateKey(currentDate)] = dayReservations;
  lsSave('reservations', allRes);
  renderGrid();

  // Supabaseに保存（完了を待つ）
  savingInProgress = true;
  const ok = await sbUpsert('yoyaku_reservations', {
    id: data.id, date: data.date, name: data.name, menu: data.menu,
    staff_id: data.staffId || null, start_time: data.start, end_time: data.end,
    room_id: data.roomId, memo: data.memo, type: data.type,
    checked_in: data.checkedIn, aftercare_end: data.aftercareEnd,
    aftercare_staff_id: data.aftercareStaffId,
    sub_assignments: data.subAssignments || null,
    practice_staff_ids: data.practiceStaffIds || null,
    block_room_ids: data.blockRoomIds || null,
    block_staff_ids: data.blockStaffIds || null,
    customer_id: document.getElementById('resCustomerId').value || null,
    updated_at: new Date().toISOString()
  });
  savingInProgress = false;
  if (!ok) alert('予約の保存に失敗しました。電波状況を確認して再度お試しください。');
  closeModal('reservationModal');
}

async function deleteReservation() {
  if (!editingRes) return;
  if (!confirm(`${editingRes.name} の予約を削除しますか？`)) return;
  const id = editingRes.id;
  dayReservations = dayReservations.filter(r => r.id !== id);

  // localStorageキャッシュ更新
  const allRes = lsLoad('reservations', {});
  allRes[dateKey(currentDate)] = dayReservations;
  lsSave('reservations', allRes);
  renderGrid();
  // Supabaseからも削除（完了を待つ）
  savingInProgress = true;
  const ok = await sbDelete('yoyaku_reservations', `id=eq.${id}`);
  savingInProgress = false;
  if (!ok) alert('予約の削除に失敗しました。電波状況を確認して再度お試しください。');
  closeModal('reservationModal');
}

    const li = document.createElement('li'); li.className = 'settings-item';

      <input class="staff-name-input" value="${s.name}" data-idx="${i}" placeholder="スタッフ名">
      <input type="color" class="color-input" value="${s.color}" data-idx="${i}">
      <button class="delete-staff-btn" data-idx="${i}">&times;</button>`;
    ul.appendChild(li);
  }); p.appendChild(ul);
  p.querySelectorAll('.staff-name-input').forEach(inp => { inp.addEventListener('change', e => { staff[e.target.dataset.idx].name = e.target.value; saveStaffConfig(); }); });
  p.querySelectorAll('.color-input').forEach(inp => { inp.addEventListener('input', e => { staff[e.target.dataset.idx].color = e.target.value; e.target.closest('.settings-item').querySelector('.staff-color-dot').style.background = e.target.value; saveStaffConfig(); }); });
  p.querySelectorAll('.delete-staff-btn').forEach(btn => { btn.addEventListener('click', e => { const i=parseInt(e.target.dataset.idx); if(confirm(`${staff[i].name}を削除？`)){staff.splice(i,1);saveStaffConfig();renderStaffSettings();} }); });
  const ab = document.createElement('button'); ab.className = 'add-btn'; ab.textContent = '+ スタッフを追加';
  ab.addEventListener('click', () => { const c=['#FFE082','#F8BBD0','#C8E6C9','#B3E5FC','#E1BEE7','#FFE0B2','#B2DFDB','#F0F4C3']; staff.push({id:'s'+Date.now(),name:'新しいスタッフ',color:c[staff.length%c.length]}); saveStaffConfig(); renderStaffSettings(); });
  p.appendChild(ab);
}

function renderChecklistSettings() {
  const p = document.getElementById('checklistPanel'); p.innerHTML = '';
  const ul = document.createElement('ul'); ul.className = 'settings-list';
  checks.forEach((c,i) => {
    const li = document.createElement('li'); li.className = 'settings-item';
    li.innerHTML = `<input class="staff-name-input" value="${c.label}" data-idx="${i}" placeholder="チェック項目">
      <button class="delete-staff-btn" data-idx="${i}">&times;</button>`;
    ul.appendChild(li);
  }); p.appendChild(ul);

// 月間シフトデータのキャッシュ
let calShiftsCache = {};

async function loadMonthShifts(year, month) {
  const key = `${year}-${String(month+1).padStart(2,'0')}`;
  // 月初〜月末
  const firstDay = `${key}-01`;
  const lastDay = new Date(year, month + 1, 0);
  const lastDayStr = `${key}-${String(lastDay.getDate()).padStart(2,'0')}`;
  const data = await sbGet('yoyaku_shifts', `date=gte.${firstDay}&date=lte.${lastDayStr}`);
  if (data) {
    const shifts = data.map(s => ({
      id: s.id, staffId: s.staff_id, date: s.date,
      start: s.start_time, end: s.end_time, isOff: s.is_off
    }));
    calShiftsCache[key] = shifts;
    return shifts;
  }
  return calShiftsCache[key] || [];
}

function getStaffShiftForCal(staffId, date, monthShifts) {
  const dk = dateKey(date);
  const shift = monthShifts.find(s => s.staffId === staffId && s.date === dk);
  if (shift) {
    if (shift.isOff) return null;
    return { start: parseFloat(shift.start), end: parseFloat(shift.end) };
  }
  // フォールバック: デフォルトシフト
  const dow = date.getDay();
  const bh = getBH(date);
  if (!bh) return null;
  switch (staffId) {
    case 's1': case 's9': case 's4': return { start: bh.start, end: bh.end };
    case 's2': return { start: bh.start, end: 17 };
    case 's3': return { start: bh.start, end: 13 };
    case 's5': return dow === 6 ? { start: bh.start, end: bh.end } : null;
    default: return { start: bh.start, end: bh.end };
  }
}

async function renderCalendar() {
  const year = calMonth.getFullYear();
  const month = calMonth.getMonth();
  document.getElementById('calMonthLabel').textContent = `${year}年${month+1}月`;

  // スタッフフィルター更新
  const sel = document.getElementById('calStaffFilter');
  const curVal = sel.value;
  sel.innerHTML = '<option value="all">全スタッフ</option>';
  staff.forEach(s => {
    sel.innerHTML += `<option value="${s.id}" ${curVal===s.id?'selected':''}>${s.name}</option>`;
  });
  if (curVal && curVal !== 'all') sel.value = curVal;
  calStaffFilter = sel.value;

  // シフトデータを取得
  const monthShifts = await loadMonthShifts(year, month);

  const grid = document.getElementById('calendarGrid');
  let html = '';
  // 曜日ヘッダー
  const dowLabels = ['日','月','火','水','木','金','土'];
  dowLabels.forEach((d, i) => {
    html += `<div class="cal-header ${i===0?'sun':''} ${i===6?'sat':''}">${d}</div>`;
  });

  // 月の日付を生成
  const firstDate = new Date(year, month, 1);
  const startDow = firstDate.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  // 前月の末尾
  for (let i = 0; i < startDow; i++) {
    const d = new Date(year, month, -(startDow - 1 - i));
    html += renderCalCell(d, monthShifts, true);
  }
  // 当月
  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(year, month, day);
    html += renderCalCell(d, monthShifts, false);
  }
  // 翌月の頭（6行埋め）
  const totalCells = startDow + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    const d = new Date(year, month + 1, i);
    html += renderCalCell(d, monthShifts, true);
  }

  grid.innerHTML = html;

  // セルクリックイベント
  grid.querySelectorAll('.cal-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const d = new Date(cell.dataset.date + 'T00:00:00');
      // 予約表に切り替えてその日に移動
      goToDate(d);
      document.querySelectorAll('.header-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-page="schedule"]').classList.add('active');
      document.querySelectorAll('.page-content').forEach(p => p.style.display = 'none');
      document.getElementById('page-schedule').style.display = 'flex';
      currentPage = 'schedule';
    });
  });
}

function renderCalCell(date, monthShifts, isOther) {
  const dk = dateKey(date);
  const dow = date.getDay();
  const bh = getBH(date);
  const isToday = dk === dateKey(new Date());
  const isClosed = !bh;

  let cls = 'cal-cell';
  if (isOther) cls += ' other-month';
  if (isToday) cls += ' today';
  if (isClosed) cls += ' closed';

  let html = `<div class="${cls}" data-date="${dk}">`;
  html += `<div class="cal-day ${dow===0?'sun':''} ${dow===6?'sat':''}">${date.getDate()}</div>`;

  if (!isClosed) {
    const showStaff = calStaffFilter === 'all' ? staff : staff.filter(s => s.id === calStaffFilter);
    html += `<div class="cal-dots">`;
    showStaff.forEach(s => {
      const shift = getStaffShiftForCal(s.id, date, monthShifts);
      if (shift) {
        html += `<div class="cal-name" style="background:${s.color}">${shortName(s)}</div>`;
      }
    });
    html += `</div>`;
  } else {
    html += `<div style="font-size:9px;color:var(--text-muted)">休</div>`;
  }
  html += `</div>`;
  return html;
}

// ── 顧客検索オートコンプリート（カルテ連携） ──
const KARTE_APP_URL = 'https://daichi-0505.github.io/grancenote-karte/';
let customerSearchTimeout = null;

document.getElementById('resName').addEventListener('input', function() {
  clearTimeout(customerSearchTimeout);
  const q = this.value.trim();
  const suggest = document.getElementById('customerSuggest');
  document.getElementById('resCustomerId').value = '';
  document.getElementById('karteLink').style.display = 'none';
  if (q.length < 1) { suggest.style.display = 'none'; return; }
  customerSearchTimeout = setTimeout(async () => {
    // ひらがな⇔カタカナ変換
    const toKata = s => s.replace(/[\u3041-\u3096]/g, c => String.fromCharCode(c.charCodeAt(0) + 96));
    const toHira = s => s.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0) - 96));
    const kata = encodeURIComponent(toKata(q));
    const hira = encodeURIComponent(toHira(q));
    const orig = encodeURIComponent(q);
    const results = await sbGet('customers', `or=(name.ilike.${orig}*,name_kana.ilike.${kata}*,name_kana.ilike.${hira}*)&select=id,name,phone,default_duration,membership_plan&order=name&limit=8`);
    if (results.length === 0) { suggest.style.display = 'none'; return; }
    suggest.innerHTML = results.map(c =>
      `<div style="padding:12px 14px;cursor:pointer;border-bottom:1px solid #eee;font-size:15px;font-weight:600;" onmousedown="selectCustomer('${c.id}','${c.name.replace(/'/g,"\\'")}','${c.phone||""}',${c.default_duration||60})">${c.name}<span style="color:#999;margin-left:8px;font-size:12px;font-weight:400;">${c.membership_plan ? c.membership_plan+' ' : ''}${c.default_duration||60}分${c.phone ? ' / '+c.phone : ''}</span></div>`
    ).join('');
    suggest.style.display = 'block';
  }, 300);
});
document.getElementById('resName').addEventListener('blur', function() {
  setTimeout(() => { document.getElementById('customerSuggest').style.display = 'none'; }, 200);
});

function selectCustomer(id, name, phone, duration) {
  document.getElementById('resName').value = name;
  document.getElementById('resCustomerId').value = id;
  document.getElementById('customerSuggest').style.display = 'none';
  document.getElementById('karteLinkUrl').href = KARTE_APP_URL + '?customer_id=' + id;
  document.getElementById('karteLink').style.display = 'block';
  // 施術時間で終了時間を自動計算（スタッフが手動変更済みの場合はスキップ）
  if (duration && !endTimeManuallySet) {
    const startVal = document.getElementById('resStart').value;
    if (startVal) {
      const [sh, sm] = startVal.split(':').map(Number);
      const startMin = sh * 60 + sm;
      // 施術終了時間
      const endMin = startMin + duration;
      const eh = Math.floor(endMin / 60);
      const em = endMin % 60;
      document.getElementById('resEnd').value = `${eh}:${String(em).padStart(2, '0')}`;
      // アフターケア終了 = 施術終了 + 残り時間（最大30分）
      const acDuration = Math.min(90 - duration, 30);
      const acMin = endMin + (acDuration > 0 ? acDuration : 0);
      const ach = Math.floor(acMin / 60);
      const acm = acMin % 60;
      document.getElementById('resAftercareEnd').value = `${ach}:${String(acm).padStart(2, '0')}`;
    }
  }
}
